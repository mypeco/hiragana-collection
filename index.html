                speakWithSettings(wordObj.word, settings);
                if (!readWords.includes(wordObj.id)) {
                    setWordRegisterTarget({ ...wordObj, pendingShots: bestShots });
                } else {
                    emitEmojiParticles(e, wordObj.icon);
                }
            };

            const searchResults = useMemo(() => {
                if (!searchQuery.trim() || typeof KANA_DATA === 'undefined') return [];
                const query = searchQuery.trim().toLowerCase();
                
                return KANA_DATA.filter(k => {
                    const matchChar = k.char.includes(query);
                    const matchWord = k.word && k.word.includes(query);
                    return matchChar || matchWord;
                });
            }, [searchQuery]);

            const totalCollected = Object.keys(bestShots).length;
            const durationMs = (settings.newDuration || 7) * 24 * 60 * 60 * 1000;
            const now = Date.now();

            const sortedWords = useMemo(() => {
                if (typeof WORD_DATA === 'undefined') return [];
                return [...WORD_DATA].map((wordObj, index) => {
                    const charsOnly = wordObj.word.split('').filter(isTargetChar);
                    const isUnlocked = charsOnly.length > 0 && charsOnly.every(char => bestShots[char]);
                    let isNew = false;
                    let latestTimestamp = 0;
                    
                    if (isUnlocked) {
                        latestTimestamp = Math.max(...charsOnly.map(char => bestShots[char].timestamp));
                        if (now - latestTimestamp < durationMs) isNew = true;
                    }
                    return { ...wordObj, isUnlocked, isNew, originalIndex: index, latestTimestamp };
                }).sort((a, b) => {
                    const getScore = (item) => {
                        if (item.isUnlocked && item.isNew) return 3; 
                        if (item.isUnlocked && !item.isNew) return 2; 
                        return 1; 
                    };
                    const scoreDiff = getScore(b) - getScore(a);
                    if (scoreDiff !== 0) return scoreDiff;
                    if (a.isUnlocked && b.isUnlocked) return b.latestTimestamp - a.latestTimestamp;
                    return a.originalIndex - b.originalIndex; 
                });
            }, [bestShots, durationMs, now]);

            const displayWords = useMemo(() => {
                if (!searchQuery.trim()) return sortedWords;
                const query = searchQuery.trim();
                return sortedWords.filter(w => w.word.includes(query) || w.reading.includes(query));
            }, [sortedWords, searchQuery]);

            const newKanjis = useMemo(() => {
                const news = [];
                if (typeof KANA_DATA !== 'undefined') {
                    KANA_DATA.forEach(kanji => {
                        const shot = bestShots[kanji.char];
                        if (shot) {
                            const isNew = shot.timestamp && (now - shot.timestamp < durationMs);
                            if (isNew) news.push({ ...kanji, shot });
                        }
                    });
                }
                news.sort((a, b) => b.shot.timestamp - a.shot.timestamp);
                return news;
            }, [bestShots, durationMs, now]);

            // ② ひらがな一覧の枠色を3モード対応で返すヘルパー関数
            const getKanaThemeColor = (shotType) => {
                if (shotType === 'trace') return COLOR_OPTIONS.find(c => c.id === settings.traceColor)?.class || COLOR_OPTIONS[0].class;
                if (shotType === 'blank') return COLOR_OPTIONS.find(c => c.id === settings.blankColor)?.class || COLOR_OPTIONS[1].class;
                // test
                return COLOR_OPTIONS.find(c => c.id === settings.testColor)?.class || COLOR_OPTIONS[3].class;
            };

            const renderKanaTable = (tableData) => {
                return (
                    <div className="overflow-x-auto pb-4 w-full flex justify-center">
                        <div className="flex flex-row-reverse justify-end gap-1.5 sm:gap-2 min-w-max px-2">
                            {tableData.map((col, colIdx) => (
                                <div key={`col-${colIdx}`} className="flex flex-col gap-1.5 sm:gap-2">
                                    {col.map((char, rowIdx) => {
                                        if (char === null) {
                                            return <div key={`empty-${colIdx}-${rowIdx}`} className="w-11 h-11 sm:w-14 sm:h-14 md:w-16 md:h-16"></div>;
                                        }
                                        
                                        const kanjiData = typeof KANA_DATA !== 'undefined' ? KANA_DATA.find(k => k.char === char) : null;
                                        
                                        if (!kanjiData) {
                                            return (
                                                <div key={`und-${char}`} className="w-11 h-11 sm:w-14 sm:h-14 md:w-16 md:h-16 border-2 border-dashed border-stone-200 bg-stone-50/50 rounded-lg flex items-center justify-center text-stone-300 font-kyokasho opacity-60">
                                                    <span className="text-lg md:text-2xl">{char}</span>
                                                </div>
                                            );
                                        }

                                        const shot = bestShots[char];
                                        const isNewKanji = shot?.timestamp && (Date.now() - shot.timestamp < durationMs);
                                        const isSelected = (settings.hallOfFame || []).includes(char);
                                        
                                        let colorClass = 'border-2 border-dashed border-stone-300 bg-[#f4f1eb] text-stone-400';
                                        let displayContent;
                                        
                                        if (shot) {
                                            // ② 3モード対応の枠色
                                            const themeColor = getKanaThemeColor(shot.type);
                                            colorClass = `${themeColor} bg-white border-2 shadow-sm`;
                                            if (isSelected) colorClass += " ring-2 ring-amber-400 ring-offset-1";
                                            
                                            displayContent = (
                                                <div className="w-full h-full overflow-hidden rounded p-0.5 pointer-events-none">
                                                    <SvgStroke strokes={shot.strokes} strokeWidth={8} color="#4B5563" />
                                                </div>
                                            );
                                        } else {
                                            displayContent = <span className="text-xl md:text-2xl font-kyokasho pointer-events-none">{char}</span>;
                                        }

                                        return (
                                            <div key={`table-${char}`} id={`kanji-item-${char}`} 
                                                onPointerDown={(e) => handleTouchStart(char, e)}
                                                onPointerMove={handleTouchMove}
                                                onPointerUp={(e) => handleTouchEnd(kanjiData, e)}
                                                onPointerLeave={(e) => handleTouchEnd(kanjiData, e)}
                                                onContextMenu={(e) => e.preventDefault()}
                                                className={`relative w-11 h-11 sm:w-14 sm:h-14 md:w-16 md:h-16 rounded-lg cursor-pointer hover:scale-110 shadow-sm flex items-center justify-center transition-all select-none ${colorClass}`}
                                            >
                                                {isNewKanji && <div className="absolute top-0 left-0 bg-red-500 text-white text-[8px] font-bold px-1 py-0.5 rounded-br z-20 shadow-sm pointer-events-none">NEW</div>}
                                                {isSelected && <div className="absolute -top-1.5 -right-1.5 bg-amber-500 text-white rounded-full p-0.5 shadow-md z-20 pointer-events-none"><Check className="w-2 h-2"/></div>}
                                                {displayContent}
                                            </div>
                                        );
                                    })}
                                </div>
                            ))}
                        </div>
                    </div>
                );
            };

            if (view === 'admin') return <AdminScreen onBack={() => setView('grid')} settings={settings} saveSettings={saveSettingsWrapper} />;
            if (view === 'practice') return <PracticeStudio currentUser={currentUser} targetKanji={selectedKanji} settings={settings} onBack={() => setView('grid')} onSaveBest={saveBestShot} onSaveComplete={handleSaveComplete} onOpenAdmin={() => setView('admin')} onToggleSound={() => saveSettingsWrapper({...settings, soundEnabled: settings.soundEnabled === false ? true : false})} />;

            const unlockedWords = getUnlockedWords(bestShots);
            const unreadCount = unlockedWords.filter(w => !readWords.includes(w.id)).length;

            return (
                <div className="p-4 max-w-4xl mx-auto min-h-screen relative pt-20 animate-fade-in">
                    
                    {wordRegisterTarget && (
                        <WordRegisterModal
                            wordObj={wordRegisterTarget}
                            bestShots={wordRegisterTarget.pendingShots || bestShots}
                            onComplete={() => handleWordRegistered(wordRegisterTarget.id)}
                            settings={settings}
                        />
                    )}
                    
                    <div className="absolute top-4 left-0 w-full px-4 flex justify-between items-center gap-3 z-40">
                        <div className="flex gap-2 shrink-0">
                            {/* ③ ひらがな・ことばずかんタブでも「ホーム」を常に表示 */}
                            <button 
                                onClick={() => {
                                    setActiveTab('home');
                                    window.scrollTo({ top: 0, behavior: 'smooth' });
                                }} 
                                className={`flex items-center gap-1.5 text-stone-600 bg-white shadow-sm px-3 py-2 rounded-lg font-bold text-sm border-2 transition-transform hover:bg-stone-50 active:scale-95 animate-pop-in
                                    ${activeTab === 'home' ? 'border-amber-200 bg-[#faf8f5]' : 'border-[#e8e4db]'}`}
                            >
                                <span className="text-base leading-none">🏠</span>
                                <span className="hidden sm:inline">ホーム</span>
                            </button>
                            <button onClick={() => setView('admin')} title="せってい" className="flex items-center justify-center w-10 h-10 sm:w-11 sm:h-11 bg-white shadow-sm rounded-lg font-bold border-2 border-[#e8e4db] hover:bg-stone-50 active:scale-95 transition-transform">
                                <span className="text-lg sm:text-xl leading-none">⚙️</span>
                            </button>
                        </div>
                        
                        <div className="relative flex-1 max-w-sm">
                            <div className={`flex items-center bg-white border-2 rounded-full overflow-hidden transition-colors ${isSearchFocused ? 'border-amber-300 ring-4 ring-amber-100' : 'border-[#e8e4db] shadow-sm'}`}>
                                <div className="pl-3 text-stone-400"><SearchIcon className="w-5 h-5"/></div>
                                <input 
                                    type="text" placeholder={activeTab === 'words' ? "ことばをさがす..." : "みつけた文字をさがす..."} value={searchQuery}
                                    onChange={(e) => setSearchQuery(e.target.value)}
                                    onFocus={() => setIsSearchFocused(true)}
                                    onBlur={() => setTimeout(() => setIsSearchFocused(false), 200)}
                                    className="w-full py-2 px-2 outline-none font-bold text-stone-700 bg-transparent text-sm sm:text-base"
                                />
                                {searchQuery && <button onClick={() => setSearchQuery('')} className="pr-3 text-stone-400 hover:text-stone-600"><X className="w-4 h-4"/></button>}
                            </div>
                            
                            {searchQuery && isSearchFocused && activeTab !== 'words' && (
                                <div className="absolute top-full left-0 w-full mt-2 bg-white rounded-xl shadow-xl border border-stone-200 overflow-hidden max-h-60 overflow-y-auto z-50 animate-pop-in">
                                    {searchResults.length > 0 ? (
                                        searchResults.map(kanji => (
                                            <div key={kanji.char} onClick={() => { setSelectedKanji(kanji); setView('practice'); setSearchQuery(''); }} className="flex items-center gap-3 p-3 border-b border-stone-100 last:border-0 hover:bg-amber-50 cursor-pointer transition-colors">
                                                <div className="w-10 h-10 bg-amber-100 text-amber-800 font-kyokasho text-2xl flex items-center justify-center rounded shrink-0">{kanji.char}</div>
                                                <div className="flex-1 min-w-0">
                                                    <div className="text-sm font-bold text-stone-800 truncate">{kanji.word || ''}</div>
                                                </div>
                                                <div className="text-2xl shrink-0">{kanji.icon}</div>
                                            </div>
                                        ))
                                    ) : (
                                        <div className="p-4 text-center text-sm font-bold text-stone-400">みつかりませんでした</div>
                                    )}
                                </div>
                            )}
                        </div>

                        <div className="flex items-center gap-2 shrink-0">
                            <button
                                onClick={() => saveSettingsWrapper({...settings, soundEnabled: settings.soundEnabled === false ? true : false})}
                                title={settings.soundEnabled !== false ? "おとをけす" : "おとをならす"}
                                className="shrink-0 flex items-center justify-center w-10 h-10 sm:w-11 sm:h-11 rounded-full shadow-sm border-2 border-stone-200 bg-white active:scale-95 transition-transform text-xl"
                            >
                                {settings.soundEnabled !== false ? '🔔' : '🔕'}
                            </button>
                            <button onClick={onLogout} title="だれがあそぶ？" className={`shrink-0 flex items-center justify-center w-10 h-10 sm:w-11 sm:h-11 rounded-full shadow-sm border-2 ${currentUser.color.class} ${currentUser.color.border} active:scale-95 transition-transform font-bold text-xl sm:text-2xl`}>
                                {currentUser.icon}
                            </button>
                        </div>
                    </div>

                    {newWordAlert && newWordAlert.length > 0 && (
                        <div className="fixed top-20 left-1/2 -translate-x-1/2 z-50 w-[92%] max-w-sm animate-bounce-in">
                            <div className="bg-gradient-to-br from-amber-50 to-orange-50 border-4 border-amber-300 rounded-2xl p-4 shadow-2xl flex flex-col items-center gap-3">
                                <div className="flex items-center gap-2">
                                    <span className="text-2xl">📖</span>
                                    <p className="text-amber-800 font-bold text-sm leading-snug font-kyokasho">
                                        あたらしい ことばが みつかったよ！<br/>
                                        「ことばずかん」を みてみよう！
                                    </p>
                                </div>
                                {newWordAlert.length > 1 && (
                                    <div className="bg-amber-100 text-amber-700 text-xs font-bold px-3 py-1 rounded-full border border-amber-200">
                                        {newWordAlert.length}こ の あたらしいことば ✨
                                    </div>
                                )}
                                <div className="flex gap-3 w-full">
                                    <button
                                        onClick={() => { setNewWordAlert(null); setActiveTab('words'); window.scrollTo({ top: 0, behavior: 'smooth' }); }}
                                        className="flex-1 py-2.5 rounded-full font-bold text-white bg-amber-400 border-2 border-amber-500 shadow-md active:scale-95 transition-transform text-sm"
                                    >
                                        📖 みてみる
                                    </button>
                                    <button
                                        onClick={() => setNewWordAlert(null)}
                                        className="flex-1 py-2.5 rounded-full font-bold text-stone-500 bg-white border-2 border-stone-200 shadow-sm active:scale-95 transition-transform text-sm"
                                    >
                                        とじる
                                    </button>
                                </div>
                            </div>
                        </div>
                    )}

                    <div className="flex justify-center mb-8 mt-4 w-full px-2">
                        <div className="relative flex bg-white border-2 border-[#e8e4db] p-1.5 rounded-full shadow-sm overflow-x-auto">
                            <div 
                                className={`absolute top-1.5 bottom-1.5 w-32 sm:w-40 rounded-full transition-all duration-500 ease-[cubic-bezier(0.165,0.84,0.44,1)] shadow-sm z-0 bg-[#ece8df]
                                    ${activeTab === 'hiragana' ? 'translate-x-0 opacity-100' : ''}
                                    ${activeTab === 'words' ? 'translate-x-full opacity-100' : ''}
                                    ${activeTab === 'home' ? 'opacity-0' : ''}
                                `}
                            ></div>

                            <button onClick={() => setActiveTab('hiragana')} className={`relative flex-shrink-0 flex items-center justify-center gap-1 w-32 sm:w-40 py-2 rounded-full font-bold text-[13px] sm:text-base transition-colors duration-300 z-10 ${activeTab === 'hiragana' ? 'text-stone-800' : 'text-stone-400 hover:text-stone-600'}`}>
                                <GridIcon className="w-4 h-4 sm:w-5 sm:h-5 shrink-0"/> <span className="whitespace-nowrap">ひらがな</span>
                            </button>
                            <button onClick={() => setActiveTab('words')} className={`relative flex-shrink-0 flex items-center justify-center gap-1 w-32 sm:w-40 py-2 rounded-full font-bold text-[13px] sm:text-base transition-colors duration-300 z-10 ${activeTab === 'words' ? 'text-stone-800' : 'text-stone-400 hover:text-stone-600'}`}>
                                <BookOpen className="w-4 h-4 sm:w-5 sm:h-5 shrink-0"/> <span className="whitespace-nowrap">ことばずかん</span>
                                {unreadCount > 0 && <span className="absolute top-0.5 right-2 sm:right-3 bg-red-500 text-white text-[9px] sm:text-[10px] w-4 h-4 sm:w-5 sm:h-5 flex items-center justify-center rounded-full border-2 border-white shadow-sm">{unreadCount}</span>}
                            </button>
                        </div>
                    </div>
                    
                    {activeTab === 'home' && (
                        <div className="flex flex-col gap-8 pb-12 w-full animate-fade-in">

                            <div className="flex justify-center w-full mt-2 mb-4">
                                <div className="relative inline-block mt-6">
                                    <span className="absolute -top-7 -left-3 text-2xl animate-bounce" style={{animationDuration:'2.2s'}}>⭐</span>
                                    <span className="absolute -top-5 -right-5 text-xl animate-bounce" style={{animationDuration:'1.8s', animationDelay:'0.5s'}}>✨</span>
                                    <span className="absolute bottom-2 -right-3 text-lg animate-bounce" style={{animationDuration:'2.6s', animationDelay:'1s'}}>🌟</span>
                                    <h2
                                        className="text-5xl md:text-7xl text-stone-800 font-bold tracking-widest drop-shadow-md relative z-10"
                                        style={{ fontFamily: "'Yuji Boku', serif" }}
                                    >
                                        ひらがなコレクション
                                    </h2>
                                    <svg
                                        className="absolute -bottom-2 md:-bottom-6 -left-[5%] w-[110%] h-12 md:h-20 text-amber-500 z-0 pointer-events-none"
                                        viewBox="0 0 100 40"
                                        preserveAspectRatio="none"
                                    >
                                        <path d="M2,25 C20,22 50,24 95,20 C98,19 100,22 95,25 C50,30 20,28 0,32 C-2,33 0,26 2,25 Z" fill="currentColor" opacity="0.3" />
                                        <path d="M10,30 C30,28 60,30 85,26 C87,25 86,28 80,29 C50,34 30,32 8,36 C6,37 8,31 10,30 Z" fill="currentColor" opacity="0.4" />
                                    </svg>
                                </div>
                            </div>

                            <div className="w-full max-w-xs mx-auto bg-white rounded-2xl px-5 py-4 border-2 border-amber-100 shadow-sm">
                                <div className="flex justify-between items-center mb-2">
                                    <span className="text-xs font-bold text-amber-500">🏆 あつめた もじ</span>
                                    <span className="text-base font-bold text-stone-700 font-kyokasho">
                                        {totalCollected}<span className="text-xs text-stone-400 font-sans"> / {KANA_DATA.length}こ</span>
                                    </span>
                                </div>
                                <div className="w-full bg-amber-50 rounded-full h-3 overflow-hidden border border-amber-100">
                                    <div
                                        className="h-full rounded-full transition-all duration-1000"
                                        style={{
                                            width: `${Math.min(totalCollected / KANA_DATA.length * 100, 100)}%`,
                                            background: 'linear-gradient(90deg, #fbbf24, #f97316)'
                                        }}
                                    />
                                </div>
                                {totalCollected > 0 && (
                                    <div className="flex flex-wrap justify-center mt-2 gap-0.5">
                                        {[...Array(Math.min(totalCollected, 15))].map((_, i) => (
                                            <span key={i} className="text-amber-400 text-[10px] animate-pop-in">⭐</span>
                                        ))}
                                        {totalCollected > 15 && <span className="text-amber-400 text-[10px] font-bold">…</span>}
                                    </div>
                                )}
                            </div>

                            <div className="w-full flex justify-center gap-3 md:gap-6 flex-wrap">
                                {[
                                    { bg: '#fff0f6', border: '#ffb8d9', shadow: '#ffb8d988', star: '🌸', rotate: '-rotate-2' },
                                    { bg: '#fffbe6', border: '#ffd666', shadow: '#ffd66688', star: '⭐', rotate: 'rotate-1' },
                                    { bg: '#f0fff4', border: '#87e8a1', shadow: '#87e8a188', star: '🍀', rotate: '-rotate-1' },
                                    { bg: '#f3f0ff', border: '#c3afe8', shadow: '#c3afe888', star: '🌟', rotate: 'rotate-2' },
                                ].map((theme, index) => {
                                    const char = settings.hallOfFame?.[index];
                                    const shot = char ? bestShots[char] : null;
                                    return (
                                        <div key={`frame-${index}`} className="flex flex-col items-center gap-2">
                                            <div
                                                className={`w-24 h-24 md:w-32 md:h-32 relative cursor-pointer transition-all duration-300 rounded-2xl hover:scale-110 hover:-translate-y-2 ${theme.rotate}`}
                                                style={{
                                                    background: theme.bg,
                                                    border: `4px solid ${theme.border}`,
                                                    boxShadow: `0 8px 20px -4px ${theme.shadow}`
                                                }}
                                            >
                                                <div
                                                    className="absolute -top-3 -right-3 w-8 h-8 bg-white rounded-full flex items-center justify-center shadow-md text-base border-2"
                                                    style={{ borderColor: theme.border }}
                                                >
                                                    {theme.star}
                                                </div>
                                                <div
                                                    className="absolute -bottom-2 -left-2 w-6 h-6 rounded-full flex items-center justify-center text-[11px] font-bold text-white shadow-sm"
                                                    style={{ backgroundColor: theme.border }}
                                                >
                                                    {index + 1}
                                                </div>
                                                <div className="w-full h-full flex items-center justify-center p-3">
                                                    {shot ? (
                                                        <div className="w-full h-full">
                                                            <SvgStroke strokes={shot.strokes} strokeWidth={12} color="#374151" />
                                                        </div>
                                                    ) : (
                                                        <div className="flex flex-col items-center gap-1 select-none">
                                                            <span className="text-3xl opacity-20">{theme.star}</span>
                                                            <span className="text-[9px] font-bold opacity-30 font-kyokasho">あき</span>
                                                        </div>
                                                    )}
                                                </div>
                                            </div>
                                        </div>
                                    );
                                })}
                            </div>

                            {totalCollected === 0 && (
                                <div className="text-center py-6 animate-fade-in">
                                    <div className="text-5xl mb-3 animate-bounce">✏️</div>
                                    <p className="text-stone-600 font-bold text-base font-kyokasho leading-loose">
                                        「ひらがな」タブから<br/>れんしゅうしてみよう！
                                    </p>
                                    <p className="text-stone-400 text-sm mt-2">かけた もじが ここに あつまるよ ✨</p>
                                </div>
                            )}

                            {newKanjis.length > 0 && (
                                <div className="rounded-2xl p-3 pt-9 border-2 border-amber-200 shadow-sm relative overflow-visible mt-2 max-w-4xl mx-auto w-full"
                                    style={{ background: 'linear-gradient(135deg, #fffbeb, #fff7ed)' }}
                                >
                                    <div className="absolute top-0 left-1/2 -translate-x-1/2 -translate-y-1/2 whitespace-nowrap text-white text-xs font-bold px-5 py-1.5 rounded-full shadow-lg"
                                        style={{ background: 'linear-gradient(90deg, #f59e0b, #f97316)' }}
                                    >
                                        ✨ さいきん かけた もじ ✨
                                    </div>
                                    <div className="grid grid-cols-6 sm:grid-cols-8 md:grid-cols-10 gap-1.5 md:gap-2">
                                        {newKanjis.map(item => {
                                            // ② NEWセクションも3モード対応
                                            const themeColor = getKanaThemeColor(item.shot.type);
                                            return (
                                                <div key={`col-new-${item.char}`} id={`col-new-${item.char}`} onClick={() => { setSelectedKanji(item); setView('practice'); }} className={`relative aspect-square rounded-xl cursor-pointer hover:scale-110 shadow-sm flex items-center justify-center transition-all border-2 bg-white ${themeColor}`}>
                                                    <div className="w-full h-full overflow-hidden rounded-lg p-0.5 pointer-events-none">
                                                        <SvgStroke strokes={item.shot.strokes} strokeWidth={8} color="#1F2937" />
                                                    </div>
                                                </div>
                                            );
                                        })}
                                    </div>
                                </div>
                            )}
                        </div>
                    )}

                    {activeTab === 'hiragana' && (
                        <div className="flex flex-col gap-6 pb-12 w-full animate-fade-in">

                            <div className="w-full bg-white rounded-2xl px-5 py-3 border-2 border-amber-100 shadow-sm flex items-center gap-4">
                                <span className="text-lg shrink-0">🏆</span>
                                <div className="flex-1">
                                    <div className="flex justify-between items-center mb-1">
                                        <span className="text-[11px] font-bold text-amber-500">あつめた もじ</span>
                                        <span className="text-sm font-bold text-stone-700 font-kyokasho">{totalCollected}<span className="text-xs text-stone-400 font-sans"> / {KANA_DATA.length}こ</span></span>
                                    </div>
                                    <div className="w-full bg-amber-50 rounded-full h-2.5 overflow-hidden border border-amber-100">
                                        <div className="h-full rounded-full transition-all duration-1000" style={{ width: `${Math.min(totalCollected / KANA_DATA.length * 100, 100)}%`, background: 'linear-gradient(90deg, #fbbf24, #f97316)' }} />
                                    </div>
                                </div>
                            </div>

                            <div className="rounded-2xl p-4 border-2 border-amber-100 shadow-sm sticky top-20 z-30 backdrop-blur-sm" style={{ background: 'linear-gradient(135deg, #fffbeb, #fff7ed)' }}>
                                <h3 className="text-center text-amber-600 font-bold text-xs mb-3 flex items-center justify-center gap-2">
                                    <Sparkles className="w-3 h-3"/> ギャラリーにかざる 4まい <Sparkles className="w-3 h-3"/>
                                </h3>
                                <div className="flex justify-center gap-2 md:gap-3">
                                    {[
                                        { bg: '#fff0f6', border: '#ffb8d9', star: '🌸' },
                                        { bg: '#fffbe6', border: '#ffd666', star: '⭐' },
                                        { bg: '#f0fff4', border: '#87e8a1', star: '🍀' },
                                        { bg: '#f3f0ff', border: '#c3afe8', star: '🌟' },
                                    ].map((theme, index) => {
                                        const char = settings.hallOfFame?.[index];
                                        const shot = char ? bestShots[char] : null;
                                        return (
                                            <div key={`tray-${index}`}
                                                className="w-14 h-14 md:w-20 md:h-20 rounded-xl flex items-center justify-center relative shrink-0 transition-transform hover:scale-105"
                                                style={{ background: theme.bg, border: `3px solid ${theme.border}` }}
                                            >
                                                {shot ? (
                                                    <>
                                                        <img src={shot.image} className="w-full h-full object-contain p-1 rounded-lg" />
                                                        <button onClick={() => removeHallOfFame(index)}
                                                            className="absolute -top-2 -right-2 bg-white rounded-full p-0.5 shadow-md hover:scale-110 active:scale-95 z-40 border-2"
                                                            style={{ borderColor: theme.border }}
                                                        >
                                                            <X className="w-3 h-3 md:w-4 md:h-4" style={{ color: theme.border }}/>
                                                        </button>
                                                    </>
                                                ) : (
                                                    <div className="flex flex-col items-center opacity-40">
                                                        <span className="text-xl">{theme.star}</span>
                                                        <span className="text-[8px] font-bold font-kyokasho mt-0.5">あき</span>
                                                    </div>
                                                )}
                                            </div>
                                        );
                                    })}
                                </div>
                                <p className="text-center text-[10px] text-stone-400 mt-3 font-bold flex items-center justify-center gap-1">
                                    したの ひょうから
                                    <span className="bg-amber-100 text-amber-700 font-bold px-2 py-0.5 rounded-full text-[10px]">ながおし</span>
                                    してね！
                                </p>
                            </div>

                            <div className="bg-white rounded-2xl p-4 md:p-6 shadow-sm border-2 border-sky-100 w-full">
                                <div className="flex items-center justify-center gap-2 mb-6">
                                    <span className="text-2xl">🌸</span>
                                    <h3 className="font-bold text-sky-600 text-center tracking-widest text-lg">あいうえお</h3>
                                    <span className="text-2xl">🌸</span>
                                </div>
                                {renderKanaTable(SEION_TABLE)}
                            </div>

                            <div className="bg-white rounded-2xl p-4 md:p-6 shadow-sm border-2 border-purple-100 w-full">
                                <div className="flex items-center justify-center gap-2 mb-6">
                                    <span className="text-2xl">⚡</span>
                                    <h3 className="font-bold text-purple-600 text-center tracking-widest text-lg">てんてん・まる・ちいさいもじ</h3>
                                    <span className="text-2xl">⚡</span>
                                </div>
                                {renderKanaTable(DAKUON_YOUON_TABLE)}
                            </div>

                        </div>
                    )}

                    {activeTab === 'words' && typeof WORD_DATA !== 'undefined' && (
                        <div className="grid grid-cols-2 sm:grid-cols-3 gap-4 pb-12">
                            {displayWords.length === 0 && (
                                <div className="col-span-2 sm:col-span-3 text-center py-10">
                                    <div className="text-4xl mb-2">🔍</div>
                                    <div className="text-stone-400 font-bold">みつかりませんでした</div>
                                </div>
                            )}
                            {displayWords.map(wordObj => {
                                const isUnread = wordObj.isUnlocked && !readWords.includes(wordObj.id);

                                if (wordObj.isUnlocked) {
                                    return (
                                        <div key={wordObj.id} onClick={(e) => handleWordClick(wordObj, e)}
                                            className={`relative rounded-2xl text-center cursor-pointer hover:scale-105 hover:-translate-y-1 transition-all overflow-hidden group border-2
                                                ${isUnread
                                                    ? 'bg-gradient-to-b from-amber-50 to-white border-amber-400 shadow-lg animate-unlock-glow'
                                                    : 'bg-white border-amber-200 shadow-sm'}`}
                                        >
                                            <div className={`w-full h-2.5 ${isUnread ? 'bg-gradient-to-r from-yellow-300 via-amber-400 to-orange-400' : 'bg-gradient-to-r from-amber-300 to-orange-300'}`}/>

                                            {wordObj.isNew && !isUnread && (
                                                <div className="absolute top-2.5 left-0 text-white text-[9px] font-bold px-2 py-0.5 rounded-r-full shadow-sm z-20"
                                                    style={{ background: 'linear-gradient(90deg, #f59e0b, #f97316)' }}>
                                                    NEW✨
                                                </div>
                                            )}

                                            <div className="p-3 pt-2">
                                                <div className={`text-4xl mt-1 transition-transform ${isUnread ? 'animate-bounce' : 'group-hover:scale-110'}`}
                                                    style={isUnread ? { animationDuration: '1.8s' } : {}}>
                                                    {wordObj.icon}
                                                </div>
                                                <div className="text-2xl font-kyokasho text-stone-800 tracking-widest mt-2 leading-snug">{wordObj.word}</div>

                                                {isUnread ? (
                                                    <div className="mt-2.5 mb-1">
                                                        <div className="inline-flex items-center gap-1 bg-amber-400 text-white text-xs font-bold px-3 py-1.5 rounded-full shadow-md animate-pulse">
                                                            🔓 タップして とうろく！
                                                        </div>
                                                    </div>
                                                ) : (
                                                    <div className="flex justify-center gap-1 mt-2.5 flex-wrap">
                                                        {wordObj.word.split('').map((char, i) => {
                                                            if (!isTargetChar(char)) return (
                                                                <div key={i} className="w-7 h-7 rounded-lg border border-stone-200 flex items-center justify-center text-stone-500 bg-stone-50 text-xs font-kyokasho shrink-0">{char}</div>
                                                            );
                                                            return (
                                                                <div key={i}
                                                                    onClick={(e) => { e.stopPropagation(); speakWithSettings(char, settings, { rate: 0.8, pitch: 1.2 }); }}
                                                                    className="w-7 h-7 rounded-lg border-2 border-amber-200 bg-amber-50 overflow-hidden shrink-0 cursor-pointer hover:border-amber-400 hover:scale-110 transition-transform active:scale-95">
                                                                    <SvgStroke strokes={bestShots[char].strokes} strokeWidth={8} color="#92400e"/>
                                                                </div>
                                                            );
                                                        })}
                                                    </div>
                                                )}
                                            </div>
                                        </div>
                                    );
                                } else {
                                    const charsNeeded = wordObj.word.split('').filter(c => isTargetChar(c) && !bestShots[c]);
                                    const totalChars = wordObj.word.split('').filter(c => isTargetChar(c)).length;
                                    const doneChars = totalChars - charsNeeded.length;

                                    return (
                                        <div key={wordObj.id}
                                            className="relative bg-stone-50 rounded-2xl text-center overflow-hidden border-2 border-dashed border-stone-200"
                                        >
                                            <div className="w-full h-2.5 bg-stone-200"/>
                                            <div className="p-3 pt-2">
                                                <div className="text-3xl opacity-20 mt-1">🔒</div>
                                                <div className="text-2xl font-kyokasho text-stone-300 tracking-widest mt-2">{wordObj.word.replace(/[\u3040-\u309f\u4e00-\u9faf]/g, '？')}</div>

                                                {charsNeeded.length > 0 && (
                                                    <div className="mt-2 bg-amber-50 border border-amber-200 rounded-xl px-2 py-1.5 inline-block">
                                                        <span className="text-[10px] font-bold text-amber-600">
                                                            あと <span className="text-sm text-amber-700">{charsNeeded.length}</span> もじ！
                                                        </span>
                                                    </div>
                                                )}

                                                <div className="flex justify-center gap-1 mt-2 flex-wrap">
                                                    {wordObj.word.split('').map((char, i) => {
                                                        if (!isTargetChar(char)) return (
                                                            <div key={i} className="w-7 h-7 rounded-lg border border-transparent flex items-center justify-center text-stone-300 text-xs font-kyokasho shrink-0">{char}</div>
                                                        );
                                                        return bestShots[char] ? (
                                                            <div key={i} className="w-7 h-7 rounded-lg border-2 border-amber-200 bg-amber-50 overflow-hidden shrink-0 pointer-events-none">
                                                                <SvgStroke strokes={bestShots[char].strokes} strokeWidth={8} color="#92400e"/>
                                                            </div>
                                                        ) : (
                                                            <div key={i}
                                                                onClick={(e) => { e.stopPropagation(); const targetK = KANA_DATA.find(k => k.char === char); if (targetK) { setSelectedKanji(targetK); setView('practice'); setSearchQuery(''); } }}
                                                                className="w-7 h-7 rounded-lg border-2 border-dashed border-amber-300 flex items-center justify-center bg-amber-50 text-amber-500 text-sm font-kyokasho shrink-0 cursor-pointer hover:bg-amber-100 hover:scale-110 transition-transform shadow-sm"
                                                            >{char}</div>
                                                        );
                                                    })}
                                                </div>
                                            </div>
                                        </div>
                                    );
                                }
                            })}
                        </div>
                    )}
                </div>
            );
        }

        function App() {
            const [currentUser, setCurrentUser] = useState(null);
            if (!currentUser) return <ProfileSelect onSelect={setCurrentUser} />;
            return <MainApp currentUser={currentUser} onLogout={() => setCurrentUser(null)} />;
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>

                                <div className="flex bg-white rounded-full shadow-sm border p-0.5 overflow-hidden">
                                    {(() => {
                                        const modeBtn = (mode, label, theme) => (
                                            <button key={mode} onClick={() => !hasDrawn && setPracticeMode(mode)} disabled={hasDrawn}
                                                className={`relative px-3 py-1.5 rounded-full text-xs md:text-sm font-bold transition-all ${practiceMode !== mode ? 'text-gray-400 hover:bg-gray-50' : ''} ${hasDrawn ? 'opacity-30 cursor-not-allowed' : ''}`}
                                                style={practiceMode === mode ? { backgroundColor: `${theme.hex}22`, color: theme.hex } : {}}
                                            >
                                                {label}
                                            </button>
                                        );
                                        return (<>
                                            {modeBtn('traceAll',  '✏️なぞり',   traceTheme)}
                                            {modeBtn('ten',       '⚫️てん',     tenTheme)}
                                            {modeBtn('blank',     '👁️おてほん', blankTheme)}
                                            {modeBtn('test',      '🙈みないで', testTheme)}
                                        </>);
                                    })()}
                                </div>
                            </div>

                            {/* ② 見本 + キャンバス行 */}
                            <div className={`flex items-end justify-center gap-4 md:gap-10 w-full px-4 pb-2 ${hand === 'left' ? 'flex-row-reverse' : 'flex-row'}`}>

                            {/*
                             * 見本エリア: self-center で中央線をキャンバスに揃える。
                             * ダミー(上) + ボックス + 再生ボタン(下) の構造で
                             * ダミーと再生ボタンが同じ高さなら、ボックスの中央 = エリア全体の中央。
                             */}
                            <div className={`${refSizeClass} shrink-0 self-center flex flex-col gap-1.5`}>

                                {/* ダミー: 再生ボタンと同じ高さ(h-9)で透明 → ボックスを上下対称に保つ */}
                                <div className="h-9 w-full" aria-hidden="true" />

                                {/* 見本ボックス */}
                                <div className="relative w-full aspect-square">
                                    {isTestMode && (
                                        <div className="absolute inset-0 z-30 bg-gray-100 rounded-xl flex flex-col items-center justify-center border-4 border-gray-200 shadow-inner">
                                            <span className="text-4xl mb-2 grayscale opacity-50">🙈</span>
                                            <span className="text-gray-400 font-bold text-xs md:text-sm text-center">みないで<br/>かけるかな？</span>
                                        </div>
                                    )}
                                    {isLoadingPaths ? (
                                        <div className="w-full h-full bg-white rounded-xl shadow-md border-4 border-orange-200 flex flex-col items-center justify-center text-sky-400">
                                            <Loader className="w-8 h-8 mb-2" />
                                        </div>
                                    ) : svgPaths ? (
                                        <AnimatedKana paths={svgPaths} strokes={targetKanji.strokes} multiColor={settings.partColor} onComplete={() => setIsGuideWatched(true)} isKogaki={['ゃ','ゅ','ょ','っ'].includes(targetKanji.char)} trickyStroke={targetKanji.trickyStroke} playRef={kanaPlayRef} onStatusChange={setKanaStatus} />
                                    ) : (
                                        <div className="w-full h-full bg-white rounded-xl shadow-md border-4 border-orange-200 relative select-none">
                                            <div className="absolute inset-0 pointer-events-none opacity-50 z-0">
                                                <div className="absolute top-1/2 w-full border-t-2 border-dashed border-red-300"></div>
                                                <div className="absolute left-1/2 h-full border-l-2 border-dashed border-red-300"></div>
                                            </div>
                                            <span className="absolute top-1 left-1 text-[10px] text-red-500 bg-white px-1 rounded border border-red-200 z-20 font-bold">{targetKanji.strokes}かく</span>
                                            <div className={`absolute font-kyokasho text-black leading-none flex items-center justify-center ${['ゃ','ゅ','ょ','っ'].includes(targetKanji.char) ? '' : 'inset-0'}`}
                                                style={['ゃ','ゅ','ょ','っ'].includes(targetKanji.char) ? {left:'-8%', bottom:'0%', width:'66%', height:'66%', fontSize:'4.5rem'} : {fontSize:'8rem'}}>
                                                <span>{targetKanji.char}</span>
                                            </div>
                                        </div>
                                    )}
                                </div>

                                {/* 再生ボタン(h-9固定): ダミーと同じ高さで対称 */}
                                <div className="relative flex items-center gap-1.5 h-9">
                                <button
                                    onClick={() => kanaPlayRef.current?.()}
                                    disabled={kanaStatus === 'playing' || isLoadingPaths || !svgPaths}
                                    className={`relative flex items-center justify-center gap-1.5 flex-1 h-full rounded-full font-bold transition-all shadow-md
                                        ${kanaStatus === 'playing' || isLoadingPaths || !svgPaths
                                            ? 'bg-stone-100 text-stone-400 cursor-not-allowed shadow-none'
                                            : targetKanji.trickyStroke
                                                ? 'bg-red-50 text-red-600 border-4 border-red-500 hover:bg-red-100 active:scale-95'
                                                : 'bg-sky-500 text-white hover:bg-sky-600 active:scale-95'}`}
                                >
                                    <Play className="w-4 h-4 fill-current shrink-0" />
                                    <span className="text-xs whitespace-nowrap">
                                        {kanaStatus === 'playing' ? 'さいせいちゅう' : targetKanji.trickyStroke ? 'かきじゅんちゅうい！' : 'さいせい'}
                                    </span>
                                </button>
                                {/* ⚠️ボタン右横に独立配置 */}
                                {targetKanji.trickyStroke && kanaStatus !== 'playing' && svgPaths && (
                                    <span className="text-2xl leading-none drop-shadow-md animate-bounce shrink-0">⚠️</span>
                                )}
                                </div>
                            </div>

                            <div ref={canvasContainerRef} className={`relative group ${canvasSizeClass} shrink-0`}>
                                {/* モードボタンは上の独立行に移動済み。ここには何も追加しない */}

                                <div className="relative w-full aspect-square bg-white rounded-2xl shadow-xl border-4 overflow-hidden cursor-crosshair transition-colors duration-300" style={{ borderColor: borderColor }}>
                                    {(practiceMode === 'traceAll' || practiceMode === 'trace') && svgPaths && (
    <div className={isKogaki ? "absolute pointer-events-none select-none z-0" : "absolute inset-0 flex items-center justify-center pointer-events-none select-none z-0 p-4"}
         style={isKogaki ? {left:'-8%', bottom:'0%', width:'66%', height:'66%'} : {}}>
        <svg viewBox={isKogaki ? "4 4 101 101" : "0 0 109 109"} className="w-full h-full opacity-30">
            {svgPaths.map((p, i) => <path key={i} d={p.d} fill="none" strokeWidth={settings.traceWidth ?? 6} stroke={settings.partColor ? PART_COLORS[p.groupId % PART_COLORS.length] : '#e5e7eb'} opacity={settings.partColor ? "0.4" : "1"} strokeLinecap="round" strokeLinejoin="round" />)}
        </svg>
    </div>
)}

{(practiceMode === 'ten' || practiceMode === 'hint') && svgPaths && (() => {
    const firstPath = svgPaths[0];
    if (!firstPath) return null;
    const m = firstPath.d.match(/M\s*([\d.]+)[,\s]+([\d.]+)/);
    if (!m) return null;
    return (
        <div className={isKogaki ? "absolute pointer-events-none select-none z-0" : "absolute inset-0 flex items-center justify-center pointer-events-none select-none z-0 p-4"}
             style={isKogaki ? {left:'-8%', bottom:'0%', width:'66%', height:'66%'} : {}}>
            <svg viewBox={isKogaki ? "4 4 101 101" : "0 0 109 109"} className="w-full h-full">
                <circle cx={parseFloat(m[1])} cy={parseFloat(m[2])} r={2.5} fill="#1f2937" opacity="0.9" />
            </svg>
        </div>
    );
})()}

                                    <div className="absolute inset-0 pointer-events-none opacity-50 z-0">
                                        <div className="absolute top-1/2 w-full border-t-2 border-dashed border-red-300"></div>
                                        <div className="absolute left-1/2 h-full border-l-2 border-dashed border-red-300"></div>
                                    </div>
                                    <canvas ref={canvasRef} className="absolute inset-0 w-full h-full touch-none z-10" onMouseDown={start} onMouseMove={move} onMouseUp={end} onMouseLeave={end} onTouchStart={start} onTouchMove={move} onTouchEnd={end} />
                                    
                                    {isCanvasLocked && (
                                        <div className="absolute inset-0 z-30 bg-white/80 backdrop-blur-sm flex flex-col items-center justify-center rounded-2xl border-4 border-dashed border-sky-300 animate-fade-in"><Lock className="w-12 h-12 text-sky-400 mb-2" /><span className="text-sky-700 font-bold text-sm text-center px-4 bg-white/90 py-2 rounded-xl shadow-sm">まずは 左のおてほんを<br/>「さいせい」して見てね！</span></div>
                                    )}
                                    {!practiceMode && !isCanvasLocked && (
                                        <div className="absolute inset-0 z-30 bg-stone-100/80 backdrop-blur-sm flex flex-col items-center justify-center rounded-2xl animate-fade-in">
                                            <span className="text-4xl mb-3">🎉</span>
                                            <span className="text-stone-600 font-bold text-sm text-center px-5 py-3 bg-white/90 rounded-2xl shadow-sm leading-relaxed">
                                                もっと かいてみる？<br/>モードをえらんでね 👆
                                            </span>
                                        </div>
                                    )}
                                </div>
                            </div>

                            <div className="flex flex-col items-center justify-center gap-6 md:gap-10 shrink-0 self-center relative">
                                <button onClick={clear} className="flex flex-col items-center gap-1 text-gray-400 hover:text-gray-600">
                                    <div className="w-10 h-10 md:w-12 md:h-12 bg-gray-100 rounded-full flex items-center justify-center shadow-sm">
                                        <Eraser className="w-5 h-5 md:w-6 md:h-6" />
                                    </div>
                                    <span className="text-[10px] md:text-xs font-bold">けす</span>
                                </button>

                                {strokeWarning && (
                                    <div className="fixed inset-0 z-50 flex items-center justify-center bg-gray-900/30 backdrop-blur-sm animate-fade-in p-4">
                                        <div className="bg-white rounded-2xl shadow-2xl border-4 border-red-200 p-6 w-full max-w-sm animate-bounce-in text-center">
                                            <div className="w-16 h-16 bg-red-100 text-red-500 rounded-full flex items-center justify-center mx-auto mb-4">
                                                <span className="text-3xl">⚠️</span>
                                            </div>
                                            <div className="text-red-500 font-bold mb-2 text-lg">画数がちがうみたい！</div>
                                            <p className="text-sm text-gray-600 mb-6 leading-relaxed">
                                                この字は <strong className="text-lg text-gray-800">{targetKanji.strokes}かく</strong> だよ。<br/>
                                                （いま書いたのは {allStrokesRef.current.length}かく）<br/>
                                                もう一回 書いてみる？
                                            </p>
                                            <div className="flex gap-3">
                                                <button onClick={() => { setStrokeWarning(false); clear(); }} className="flex-1 bg-sky-500 text-white font-bold py-3 rounded-xl shadow-md hover:bg-sky-600 active:scale-95 transition-all">かきなおす</button>
                                                <button onClick={() => handleFinish(true)} className="flex-1 bg-gray-100 text-gray-500 font-bold py-3 rounded-xl hover:bg-gray-200 active:scale-95 transition-all text-sm">このままにする</button>
                                            </div>
                                        </div>
                                    </div>
                                )}

                                {flyingCard.active && (
                                    <div style={{
                                        position: 'fixed',
                                        left: flyingCard.startX,
                                        top: flyingCard.startY,
                                        width: flyingCard.w,
                                        height: flyingCard.h,
                                        zIndex: 9999,
                                        pointerEvents: 'none',
                                        borderRadius: 16,
                                        border: '3px solid #fbbf24',
                                        overflow: 'hidden',
                                        boxShadow: '0 8px 32px rgba(0,0,0,0.3)',
                                        transformOrigin: 'center center',
                                        opacity: flyingCard.flying ? 0 : 1,
                                        transform: flyingCard.flying
                                            ? `translate(${flyingCard.tx}px, ${flyingCard.ty}px) rotate(360deg) scale(${flyingCard.scale})`
                                            : 'translate(0,0) rotate(0deg) scale(1)',
                                        transition: flyingCard.flying
                                            ? 'transform 0.42s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.38s ease-in 0.1s'
                                            : 'none',
                                    }}>
                                        <img src={flyingCard.image} style={{width:'100%',height:'100%',objectFit:'contain',background:'white'}} />
                                    </div>
                                )}

                                <button 
                                    onClick={() => handleFinish(false)}
                                    disabled={isAnimating || !hasDrawn} 
                                    className={`flex flex-col items-center justify-center w-14 md:w-20 h-28 md:h-36 rounded-2xl shadow-md border-2 transition-all select-none touch-none gap-1 ${hasDrawn ? 'bg-gradient-to-t from-sky-400 to-sky-300 border-sky-200 text-white hover:brightness-105 active:scale-95 cursor-pointer' : 'bg-gray-100 border-gray-200 text-gray-400 cursor-not-allowed'}`}
                                >
                                    <span className="font-black leading-none" style={{display:'inline-block',transform:'rotate(-90deg)',opacity:0.95,fontSize:'1.1rem',letterSpacing:'-3px'}}>〉〉</span>
                                    <span className="text-sm md:text-base font-bold tracking-widest leading-tight py-1">できた</span>
                                    <span className="font-black leading-none" style={{display:'inline-block',transform:'rotate(-90deg)',opacity:0.3,fontSize:'1.1rem',letterSpacing:'-3px'}}>〉〉</span>
                                </button>
                            </div>
                        </div>
                        </div>{/* mt-auto wrapper end */}
                    </div>
                </div>
            );
        };

        const ProfileSelect = ({ onSelect }) => {
            const [users, setUsers] = useState([]);
            const [isCreating, setIsCreating] = useState(false);
            const [editingUser, setEditingUser] = useState(null); 
            const [newName, setNewName] = useState('');
            const [newIcon, setNewIcon] = useState(ICON_OPTIONS[0]);
            const [newColor, setNewColor] = useState(USER_COLOR_OPTIONS[0]);

            const [isLoadingUsers, setIsLoadingUsers] = useState(false);

            useEffect(() => {
                const loadUsers = async () => {
                    setIsLoadingUsers(true);
                    let localUsers = await db.users.toArray();

                    // 既存ユーザーにprofileIdがなければ自動でUUIDを割り振る
                    for (const user of localUsers) {
                        if (!user.profileId) {
                            const newId = crypto.randomUUID();
                            const updated = { ...user, profileId: newId };
                            await db.users.put(updated);
                        }
                    }
                    localUsers = await db.users.toArray();
                    setUsers(localUsers);
                    setIsLoadingUsers(false);
                };
                loadUsers();
            }, []);

            const handleStartCreate = () => {
                setNewName('');
                setNewIcon(ICON_OPTIONS[0]);
                setNewColor(USER_COLOR_OPTIONS[0]);
                setEditingUser(null);
                setIsCreating(true);
            };

            const handleStartEdit = (user, e) => {
                e.stopPropagation();
                setNewName(user.name);
                setNewIcon(user.icon);
                setNewColor(user.color);
                setEditingUser(user);
                setIsCreating(true);
            };

            const handleSave = async () => {
                if (!newName.trim()) return;
                if (editingUser) {
                    const updatedUser = { ...editingUser, name: newName.trim(), icon: newIcon, color: newColor };
                    await db.users.put(updatedUser);
                    setUsers(prev => prev.map(u => u.id === editingUser.id ? updatedUser : u));
                    setIsCreating(false);
                    setEditingUser(null);
                } else {
                    const profileId = crypto.randomUUID();
                    const newUser = { name: newName.trim(), icon: newIcon, color: newColor, profileId };
                    const id = await db.users.add(newUser);
                    onSelect({ ...newUser, id });
                }
            };

            const handleDeleteUser = async (userId, userName, e) => {
                e.stopPropagation(); 
                if (window.confirm(`${userName} の データを ぜんぶ けしますか？\n（けした データは もとにもどせません）`)) {
                    await db.users.delete(userId);
                    await db.settings.where({ userId: userId }).delete();
                    await db.practices.where({ userId: userId }).delete();
                    await db.bestShots.where({ userId: userId }).delete();
                    await db.readWords.where({ userId: userId }).delete();

                    setUsers(prev => prev.filter(u => u.id !== userId));
                }
            };

            if (isCreating) {
                return (
                    <div className="p-6 max-w-md mx-auto min-h-screen flex flex-col items-center justify-center animate-fade-in">
                        <h1 className="text-2xl font-bold mb-6 text-stone-800 font-kyokasho">
                            {editingUser ? 'プロフィールを なおす' : 'あたらしく つくる'}
                        </h1>
                        <input type="text" placeholder="なまえ" value={newName} onChange={e => setNewName(e.target.value)} className="w-full text-center text-2xl p-4 rounded-xl border-4 border-amber-200 focus:border-amber-400 outline-none mb-6 font-kyokasho shadow-sm" />
                        <div className="w-full mb-6">
                            <p className="font-bold text-stone-500 mb-2 text-center">アイコンを えらぶ</p>
                            <div className="grid grid-cols-6 gap-2 h-48 overflow-y-auto p-3 bg-white rounded-xl border-2 border-stone-100 shadow-inner">
                                {ICON_OPTIONS.map(icon => <button key={icon} onClick={() => setNewIcon(icon)} className={`text-3xl p-1 rounded-lg transition-transform ${newIcon === icon ? 'bg-amber-100 ring-4 ring-amber-400 scale-110' : 'hover:bg-stone-50'}`}>{icon}</button>)}
                            </div>
                        </div>
                        <div className="w-full mb-8">
                            <p className="font-bold text-stone-500 mb-3 text-center">テーマカラーを えらぶ</p>
                            <div className="flex gap-4 flex-wrap justify-center">
                                {USER_COLOR_OPTIONS.map(color => <button key={color.label} onClick={() => setNewColor(color)} className={`w-12 h-12 rounded-full ${color.class} ${color.border} shadow-sm border-2 transition-all flex items-center justify-center ${newColor.label === color.label ? 'ring-4 ring-stone-400 scale-110' : 'opacity-50 hover:opacity-100'}`} />)}
                            </div>
                        </div>

                        <div className="flex gap-4 w-full">
                            <button onClick={() => { setIsCreating(false); setEditingUser(null); }} className="flex-1 py-4 rounded-full font-bold text-stone-500 bg-stone-100 active:scale-95 transition-transform">もどる</button>
                            <button onClick={handleSave} disabled={!newName.trim()} className="flex-1 py-4 rounded-full font-bold text-white bg-amber-500 disabled:opacity-50 active:scale-95 shadow-md transition-transform">ほぞんする</button>
                        </div>
                    </div>
                );
            }

            return (
                <div className="p-6 max-w-md mx-auto min-h-screen flex flex-col items-center justify-center animate-fade-in">
                    <h1 className="text-3xl font-bold mb-8 text-amber-600 font-kyokasho">だれが あそぶ？</h1>
                    <div className="w-full space-y-4 mb-8">
                        {users.length === 0 && <div className="text-center text-stone-400 font-bold py-8">まだ だれも いません</div>}
                        {users.map(user => (
                            <div key={user.id} className={`w-full flex flex-col p-4 rounded-2xl shadow-sm border-2 transition-transform hover:-translate-y-1 ${user.color.class} ${user.color.border}`}>
                                <div className="flex items-center justify-between">
                                    <div onClick={() => onSelect(user)} className="flex items-center gap-4 flex-1 cursor-pointer active:scale-95 transition-transform">
                                        <div className="text-4xl bg-white/70 w-16 h-16 flex items-center justify-center rounded-full shadow-sm shrink-0">{user.icon}</div>
                                        <span className="text-2xl font-bold font-kyokasho tracking-widest">{user.name}</span>
                                    </div>
                                    <div className="flex items-center gap-2 shrink-0 ml-2">
                                        <button onClick={(e) => handleStartEdit(user, e)} className="w-10 h-10 rounded-full bg-white/50 text-stone-500 hover:bg-amber-500 hover:text-white flex items-center justify-center transition-colors shadow-sm" title="プロフィールをなおす">
                                            <EditIcon className="w-5 h-5"/>
                                        </button>
                                        <button onClick={(e) => handleDeleteUser(user.id, user.name, e)} className="w-10 h-10 rounded-full bg-white/50 text-stone-500 hover:bg-red-500 hover:text-white flex items-center justify-center transition-colors shadow-sm" title="このデータをけす">
                                            <X className="w-5 h-5"/>
                                        </button>
                                    </div>
                                </div>
                            </div>
                        ))}
                    </div>
                    <button onClick={handleStartCreate} className="flex items-center justify-center gap-2 w-full py-4 rounded-full font-bold text-stone-500 bg-white border-2 border-dashed border-stone-300 hover:bg-stone-50 active:scale-95 transition-transform">
                        <Sparkles className="w-5 h-5"/> あたらしく つくる
                    </button>
                </div>
            );
        };

        const SEION_TABLE = [
            ['あ', 'い', 'う', 'え', 'お'],
            ['か', 'き', 'く', 'け', 'こ'],
            ['さ', 'し', 'す', 'せ', 'そ'],
            ['た', 'ち', 'つ', 'て', 'と'],
            ['な', 'に', 'ぬ', 'ね', 'の'],
            ['は', 'ひ', 'ふ', 'へ', 'ほ'],
            ['ま', 'み', 'む', 'め', 'も'],

        const emitParticles = async (targetElement) => {
            const rect = targetElement.getBoundingClientRect();
            const centerX = rect.left + rect.width / 2;
            const centerY = rect.top + rect.height / 2;

            targetElement.animate([
                { transform: `scale(1)` },
                { transform: `scale(0.8)` },
                { transform: `scale(1)` }
            ], { duration: 400, easing: "ease-out" });

            const COUNT = 40;
            const stars = []; 
            const starClipPath = "polygon(50% 0%, 61% 35%, 98% 35%, 68% 57%, 79% 91%, 50% 70%, 21% 91%, 32% 57%, 2% 35%, 39% 35%)";

            for (let i = 0; i < COUNT; i++) {
                const star = document.createElement("div"); 
                star.style.position = "fixed";
                star.style.left = `${centerX}px`;
                star.style.top = `${centerY}px`;
                star.style.width = "12px";
                star.style.height = "12px";
                star.style.webkitClipPath = starClipPath;
                star.style.clipPath = starClipPath;
                star.style.pointerEvents = "none";
                star.style.zIndex = "9999"; 
                const hue = 30 + Math.random() * 25; 
                star.style.backgroundColor = `hsl(${hue}, 90%, 60%)`;
                document.body.appendChild(star);
                stars.push(star);
            }

            const animations = stars.map((star) => {
                const angle = 360 * Math.random();
                const dist = 60 + Math.random() * 80; 
                const size = 0.5 + Math.random() * 2; 

                return star.animate([
                    { transform: `translate(-50%, -50%) rotate(${angle}deg) translateX(0px) scale(${size})`, opacity: 1 },
                    { transform: `translate(-50%, -50%) rotate(${angle}deg) translateX(${dist}px) scale(${size})`, opacity: 0 }
                ], { 
                    duration: 600 + 400 * Math.random(), 
                    easing: "ease-out",
                    fill: "forwards" 
                });
            });

            await Promise.all(animations.map((anim) => anim.finished));
            stars.forEach(star => star.remove()); 
        };

        const emitEmojiParticles = (e, emoji) => {
            if (navigator.vibrate) navigator.vibrate(30);
            const rect = e.currentTarget.getBoundingClientRect();
            const startX = rect.left + rect.width / 2;
            const startY = rect.top + rect.height / 2;

            const COUNT = 5;
            for (let i = 0; i < COUNT; i++) {
                const el = document.createElement("div");
                el.innerText = emoji;
                el.style.position = "fixed";
                el.style.left = `${startX}px`;
                el.style.top = `${startY}px`;
                el.style.fontSize = `${24 + Math.random() * 16}px`;
                el.style.pointerEvents = "none";
                el.style.zIndex = "9999";
                el.style.filter = "drop-shadow(0 4px 6px rgba(0,0,0,0.2))";
                document.body.appendChild(el);

                const angle = -Math.PI / 2 + (Math.random() - 0.5) * Math.PI; 
                const velocity = 80 + Math.random() * 60;
                const duration = 1000 + Math.random() * 500;
                
                el.animate([
                    { transform: `translate(-50%, -50%) scale(0.5)`, opacity: 1 },
                    { transform: `translate(calc(-50% + ${Math.cos(angle) * velocity}px), calc(-50% + ${Math.sin(angle) * velocity}px)) scale(2.0)`, opacity: 1, offset: 0.7 },
                    { transform: `translate(calc(-50% + ${Math.cos(angle) * velocity * 1.2}px), calc(-50% + ${Math.sin(angle) * velocity * 1.2}px)) scale(2.2)`, opacity: 0 }
                ], { duration, easing: "ease-out", fill: "forwards" });

                setTimeout(() => el.remove(), duration);
            }
        };

        const StarShowerOverlay = ({ milestone, isFinal, onDismiss, starColorPalette }) => {
            const canvasRef = useRef(null);
            const animRef  = useRef(null);

            const playMilestoneSound = (isFinal) => {
                try {
                    const ac = getAudioContext();
                    if (isFinal) {
                        const notes = [
                            { freq: 523, t: 0 },
                            { freq: 659, t: 0.1 },
                            { freq: 784, t: 0.2 },
                            { freq: 1047, t: 0.35 },
                            { freq: 1319, t: 0.5 },
                            { freq: 1568, t: 0.65 },
                            { freq: 2093, t: 0.85 },
                            { freq: 2093, t: 1.1 },
                        ];
                        notes.forEach(({ freq, t }) => {
                            const o = ac.createOscillator();
                            const g = ac.createGain();
                            o.connect(g); g.connect(ac.destination);
                            o.type = 'triangle';
                            o.frequency.setValueAtTime(freq, ac.currentTime + t);
                            g.gain.setValueAtTime(0, ac.currentTime + t);
                            g.gain.linearRampToValueAtTime(0.28, ac.currentTime + t + 0.03);
                            g.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + t + 0.45);
                            o.start(ac.currentTime + t);
                            o.stop(ac.currentTime + t + 0.5);
                        });
                    } else {
                        const notes = milestone === 70
                            ? [659, 784, 1047, 1319]
                            : [659, 784, 1047];
                        notes.forEach((freq, i) => {
                            const o = ac.createOscillator();
                            const g = ac.createGain();
                            o.connect(g); g.connect(ac.destination);
                            o.type = 'triangle';
                            const t = ac.currentTime + i * 0.09;
                            o.frequency.setValueAtTime(freq, t);
                            g.gain.setValueAtTime(0, t);
                            g.gain.linearRampToValueAtTime(0.2, t + 0.02);
                            g.gain.exponentialRampToValueAtTime(0.001, t + 0.32);
                            o.start(t); o.stop(t + 0.38);
                        });
                    }
                } catch(e) {}
            };

            useEffect(() => {
                playMilestoneSound(isFinal);

                const canvas = canvasRef.current;
                if (!canvas) return;
                canvas.width  = window.innerWidth;
                canvas.height = window.innerHeight;
                const ctx = canvas.getContext('2d');
                const W = canvas.width;
                const H = canvas.height;

                const lighten = (hex, amt) => {
                    const r = Math.min(255, parseInt(hex.slice(1,3), 16) + amt);
                    const g = Math.min(255, parseInt(hex.slice(3,5), 16) + amt);
                    const b = Math.min(255, parseInt(hex.slice(5,7), 16) + amt);
                    return `rgb(${r},${g},${b})`;
                };
                const palette = starColorPalette || [
                    { hex: '#38bdf8', count: Math.floor(milestone / 3) },
                    { hex: '#4ade80', count: Math.floor(milestone / 3) },
                    { hex: '#c084fc', count: milestone - Math.floor(milestone / 3) * 2 },
                ];
                const starColors = [];
                palette.forEach(({ hex, count: c }) => {
                    for (let i = 0; i < c; i++) {
                        starColors.push(Math.random() < 0.25 ? lighten(hex, 80) : hex);
                    }
                });
                while (starColors.length < milestone) starColors.push('#FFD700');
                for (let i = starColors.length - 1; i > 0; i--) {
                    const j = Math.floor(Math.random() * (i + 1));
                    [starColors[i], starColors[j]] = [starColors[j], starColors[i]];
                }

                const count = milestone;

                const stars = Array.from({ length: count }, (_, idx) => ({
                    x:        Math.random() * W,
                    y:        -30 - Math.random() * H * 0.8,
                    size:     isFinal ? (Math.random() * 50 + 30) : (Math.random() * 14 + 8),
                    speed:    isFinal ? (Math.random() * 2 + 4) : (Math.random() * 3.5 + 2.5),
                    color:    starColors[idx % starColors.length],
                    rotation: Math.random() * Math.PI * 2,
                    rotSpeed: (Math.random() - 0.5) * 0.08,
                    settled:  false,
                    settledY: H - (Math.random() * 30 + 10),
                    swayOff:  Math.random() * Math.PI * 2,
                    swayAmp:  Math.random() * 1.5 + 0.3,
                }));

                const startTime = Date.now();

                const drawStar = (cx, cy, size, color, rot, alpha) => {
                    ctx.save();
                    ctx.globalAlpha = alpha;
                    ctx.translate(cx, cy);
                    ctx.rotate(rot);
                    ctx.fillStyle = color;
                    ctx.shadowColor = color;
                    ctx.shadowBlur  = size * 0.9;
                    ctx.beginPath();
                    for (let i = 0; i < 5; i++) {
                        const outerA = (i * 4 * Math.PI / 5) - Math.PI / 2;
                        const innerA = outerA + (2 * Math.PI / 10);
                        if (i === 0) ctx.moveTo(Math.cos(outerA) * size, Math.sin(outerA) * size);
                        else         ctx.lineTo(Math.cos(outerA) * size, Math.sin(outerA) * size);
                        ctx.lineTo(Math.cos(innerA) * size * 0.4, Math.sin(innerA) * size * 0.4);
                    }
                    ctx.closePath();
                    ctx.fill();
                    ctx.restore();
                };

                const animate = () => {
                    ctx.clearRect(0, 0, W, H);
                    const elapsed = Date.now() - startTime;
                    const t = elapsed / 1000;

                    if (isFinal) {
                        ctx.fillStyle = 'rgba(0, 0, 15, 0.6)';
                        ctx.fillRect(0, 0, W, H);

                        stars.forEach(star => {
                            if (!star.settled) {
                                star.y += star.speed;
                                star.rotation += star.rotSpeed;
                                if (star.y >= star.settledY) {
                                    star.settled = true;
                                }
                            }
                            drawStar(star.x, star.settled ? star.settledY : star.y,
                                     star.size, star.color, star.rotation, 1);
                        });

                    } else {
                        stars.forEach(star => {
                            star.y += star.speed;
                            star.x += Math.sin(t * 3 + star.swayOff) * star.swayAmp;
                            star.rotation += star.rotSpeed;
                            if (star.y > H + 20) {
                                star.y = -20;
                                star.x = Math.random() * W;
                            }
                            const alpha = elapsed > 2500
                                ? Math.max(0, 1 - (elapsed - 2500) / 1500)
                                : 1;
                            drawStar(star.x, star.y, star.size, star.color, star.rotation, alpha);
                        });
                        if (elapsed >= 4000) { onDismiss(); return; }
                    }

                    animRef.current = requestAnimationFrame(animate);
                };

                animRef.current = requestAnimationFrame(animate);
                return () => { if (animRef.current) cancelAnimationFrame(animRef.current); };
            }, []);

            const milestoneText = milestone === 70
                ? 'あと５つ！！⭐'
                : `${milestone}こ あつめたよ！🌟`;

            return (
                <div
                    className="fixed inset-0"
                    style={{ zIndex: 9000, pointerEvents: isFinal ? 'auto' : 'none' }}
                    onClick={isFinal ? onDismiss : undefined}
                >
                    <canvas ref={canvasRef} style={{ position:'absolute', inset:0, width:'100%', height:'100%', display:'block' }} />

                    {isFinal ? (
                        <div className="absolute inset-0 flex flex-col items-center justify-start pointer-events-none"
                             style={{ paddingTop: '10vh' }}>
                            <div className="text-center animate-bounce-in px-6">
                                <div style={{ fontSize:'5rem', filter:'drop-shadow(0 0 18px gold)', animation:'bounce 0.7s infinite' }}>🎊</div>
                                <div className="font-bold font-kyokasho mt-3 mb-2 animate-bounce-in"
                                     style={{ fontSize:'clamp(2rem,8vw,3.5rem)', color:'#FFD700',
                                              textShadow:'0 3px 14px rgba(0,0,0,0.9), 0 0 30px rgba(255,215,0,0.6)' }}>
                                    おめでとう！！
                                </div>
                                <div className="font-bold font-kyokasho"
                                     style={{ fontSize:'clamp(1rem,4vw,1.5rem)', color:'#FFF9C4',
                                              textShadow:'0 2px 10px rgba(0,0,0,0.9)' }}>
                                    ひらがな ７５こ ぜんぶ あつめたよ！
                                </div>
                                <div className="mt-5 font-bold"
                                     style={{ fontSize:'0.85rem', color:'rgba(255,255,255,0.55)',
                                              textShadow:'0 1px 5px rgba(0,0,0,0.9)' }}>
                                    タップして とじる
                                </div>
                            </div>
                        </div>
                    ) : (
                        <div className="absolute inset-x-0 flex justify-center pointer-events-none"
                             style={{ top:'30%', transform:'translateY(-50%)' }}>
                            <div className="animate-bounce-in">
                            <div className="font-bold font-kyokasho px-7 py-4 rounded-2xl"
                                 style={{ fontSize:'clamp(1.4rem,6vw,2.2rem)', color:'#FFFFFF',
                                          textShadow:'0 2px 14px rgba(0,0,0,0.95), 0 0 22px rgba(255,215,0,0.7)',
                                          background:'rgba(0,0,0,0.32)', backdropFilter:'blur(4px)' }}>
                                {milestoneText}
                            </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const WordRegisterModal = ({ wordObj, bestShots, onComplete, settings }) => {
            const allChars = wordObj.word.split('');
            const targetIndices = allChars.reduce((acc, c, i) => { if (isTargetChar(c)) acc.push(i); return acc; }, []);
            const [filled, setFilled] = useState([]);
            const [celebrating, setCelebrating] = useState(false);
            const [slotAnimating, setSlotAnimating] = useState(null);

            const charCount = {};
            targetIndices.forEach(i => { charCount[allChars[i]] = (charCount[allChars[i]] || 0) + 1; });
            const charFilled = {};
            filled.forEach(i => { const c = allChars[i]; charFilled[c] = (charFilled[c] || 0) + 1; });
            const uniqueTargetChars = [...new Set(targetIndices.map(i => allChars[i]))];

            const handleTapCard = (char) => {
                if (celebrating) return;
                const firstEmpty = targetIndices.find(i => allChars[i] === char && !filled.includes(i));
                if (firstEmpty === undefined) return;
                if (navigator.vibrate) navigator.vibrate(30);

                speakWithSettings(char, settings, { rate: 0.8, pitch: 1.2 });

                setSlotAnimating(firstEmpty);
                setTimeout(() => setSlotAnimating(null), 400);

                const newFilled = [...filled, firstEmpty];
                setFilled(newFilled);

                if (newFilled.length === targetIndices.length) {
                    if (navigator.vibrate) navigator.vibrate([50, 60, 80, 60, 120]);
                    setTimeout(() => {
                        setCelebrating(true);
                        speakWithSettings(wordObj.word, settings, { rate: 0.75, pitch: 1.1 });
                    }, 350);
                    setTimeout(() => onComplete(), 2600);
                }
            };

            return (
                <div className="fixed inset-0 z-50 flex items-center justify-center bg-black/50 backdrop-blur-sm animate-fade-in p-4 overflow-y-auto">
                    <div className="relative w-full max-w-lg bg-[#fdfbf7] rounded-3xl shadow-2xl overflow-hidden animate-bounce-in my-auto"
                        style={{ paddingBottom: '24px', maxHeight: '90vh', overflowY: celebrating ? 'hidden' : 'auto' }}>
                        
                        <div className="w-full h-2 bg-gradient-to-r from-amber-300 via-orange-300 to-amber-300"/>
                        
                        <div className="flex justify-center pt-3 pb-1">
                            <div className="w-10 h-1.5 bg-stone-300 rounded-full"/>
                        </div>

                        <div className="px-6 pb-8 pt-2">
                            <div className="text-center mb-5">
                                <p className="text-xs font-bold text-amber-500 tracking-widest mb-1">✨ あたらしい ことば ✨</p>
                                <div className="text-6xl mb-1">{wordObj.icon}</div>
                                <div className="text-3xl font-kyokasho text-stone-800 tracking-widest font-bold">{wordObj.word}</div>
                            </div>

                            <div className="flex justify-center gap-3 mb-2">
                                {allChars.map((c, i) => {
                                    if (!isTargetChar(c)) {
                                        return (
                                            <div key={i} className="w-14 h-14 flex items-center justify-center text-2xl font-kyokasho text-stone-500 font-bold">{c}</div>
                                        );
                                    }
                                    const isFilled = filled.includes(i);
                                    const shot = bestShots[c];
                                    return (
                                        <div key={i} className={`w-14 h-14 rounded-2xl border-4 transition-all duration-300 overflow-hidden
                                            ${isFilled
                                                ? 'border-amber-400 bg-white shadow-lg'
                                                : 'border-dashed border-amber-300 bg-amber-50/60'}`}>
                                            {isFilled && shot ? (
                                                <div className={slotAnimating === i ? 'animate-slot-pop w-full h-full' : 'w-full h-full'}>
                                                    <SvgStroke strokes={shot.strokes} strokeWidth={9} color="#78350f"/>
                                                </div>
                                            ) : (
                                                <div className="w-full h-full flex items-center justify-center text-amber-300 text-2xl font-kyokasho select-none">{c}</div>
                                            )}
                                        </div>
                                    );
                                })}
                            </div>

                            <p className="text-center text-xs text-stone-400 font-bold mb-6">↑ カードをタップして はめよう！</p>

                            <div className="flex justify-center gap-4 flex-wrap">
                                {uniqueTargetChars.map(char => {
                                    const shot = bestShots[char];
                                    const usedAll = (charFilled[char] || 0) >= charCount[char];
                                    return (
                                        <button key={char}
                                            onClick={() => handleTapCard(char)}
                                            disabled={usedAll}
                                            className={`relative w-16 h-16 rounded-xl border-2 p-1 transition-all
                                                ${usedAll
                                                    ? 'opacity-30 grayscale cursor-not-allowed border-stone-200 bg-stone-50'
                                                    : 'border-amber-400 bg-white shadow-md hover:shadow-xl hover:-translate-y-1 active:scale-90 cursor-pointer'}`}>
                                            {shot && <SvgStroke strokes={shot.strokes} strokeWidth={9} color="#78350f"/>}
                                            {usedAll && (
                                                <div className="absolute inset-0 flex items-center justify-center text-green-500 text-2xl">✓</div>
                                            )}
                                        </button>
                                    );
                                })}
                            </div>
                        </div>

                        {celebrating && (
                            <div className="absolute inset-0 flex flex-col items-center justify-center bg-gradient-to-b from-amber-50 to-orange-50 animate-celebrate-in z-20 rounded-3xl">
                                <div className="text-7xl mb-3" style={{ animation: 'bounce 0.6s infinite' }}>{wordObj.icon}</div>
                                <div className="text-4xl font-kyokasho text-amber-800 tracking-widest font-bold mb-2">{wordObj.word}</div>
                                <div className="text-lg font-bold text-amber-600 mb-4">ことばずかん に とうろく！</div>
                                <div className="flex gap-2 text-3xl animate-bounce-in">
                                    {['🌟','✨','🎊','✨','🌟'].map((e, i) => (
                                        <span key={i} style={{ animationDelay: `${i * 0.1}s`, display:'inline-block', animation: 'bounce 0.8s infinite' }}>{e}</span>
                                    ))}
                                </div>
                            </div>
                        )}
                    </div>
                </div>
            );
        };

        const MainApp = ({ currentUser, onLogout }) => {
            const [view, setView] = useState('grid');
            const [previousView, setPreviousView] = useState('grid');
            const [activeTab, setActiveTab] = useState('home'); 
            const [selectedKanji, setSelectedKanji] = useState(null);
            const [bestShots, setBestShots] = useState({});
            
            // 4段階設定のデフォルト値
            const [settings, setSettings] = useState({ targetCount: 5, traceColor: 'sky', blankColor: 'green', testColor: 'purple', newDuration: 7, partColor: true, requireGuide: true, hand: 'right', hallOfFame: [], hallOfFame2: [], soundEnabled: true, traceAllTarget: 1, tenTarget: 1, blankTarget: 1, testTarget: 1 });
            
            const [newWordAlert, setNewWordAlert] = useState(null);
            const [wordRegisterTarget, setWordRegisterTarget] = useState(null);
            const [starCelebration, setStarCelebration] = useState(null);
            const prevTotalRef = useRef(null); 
            const [readWords, setReadWords] = useState([]);

            const longPressTimerRef = useRef(null);
            const isLongPressedRef = useRef(false);
            const [isScrolling, setIsScrolling] = useState(false);

            const addHallOfFame = (char) => {
                const isEmoji = !/[\u3040-\u309F\u4e00-\u9faf]/.test(char);
                if (!isEmoji && !bestShots[char]) {
                    alert("まだ れんしゅうしていない もじは かざれないよ！\nさきに れんしゅうしてね 🎉");
                    return;
                }
                if (navigator.vibrate) navigator.vibrate(50);
                const current = settings.hallOfFame || [];
                if (current.length < 4) {
                    saveSettingsWrapper({ ...settings, hallOfFame: [...current, char] });
                } else {
                    alert("かざれるのは 4枚 までだよ！");
                }
            };

            const removeHallOfFame = (indexToRemove) => {
                if (navigator.vibrate) navigator.vibrate(50);
                const current = settings.hallOfFame || [];
                saveSettingsWrapper({ ...settings, hallOfFame: current.filter((_, i) => i !== indexToRemove) });
            };

            const addHallOfFame2 = (char) => {
                if (!bestShots[char]) {
                    alert("まだ れんしゅうしていない もじは かざれないよ！\nさきに れんしゅうしてね 🎉");
                    return;
                }
                if (navigator.vibrate) navigator.vibrate(50);

                    saveSettingsWrapper({ ...settings, hallOfFame2: [...current, char] });
                } else {
                    alert("かざれるのは 20枚 までだよ！");
                }
            };

            const removeHallOfFame2 = (indexToRemove) => {
                if (navigator.vibrate) navigator.vibrate(50);
                const current = settings.hallOfFame2 || [];
                saveSettingsWrapper({ ...settings, hallOfFame2: current.filter((_, i) => i !== indexToRemove) });
            };

            const handleTouchStart = (char, e, onLongPressOverride) => {
                setIsScrolling(false);
                isLongPressedRef.current = false;
                longPressTimerRef.current = setTimeout(() => {
                    isLongPressedRef.current = true;
                    (onLongPressOverride || addHallOfFame)(char);
                }, 500); 
            };

            const handleTouchMove = () => {
                setIsScrolling(true);
                if (longPressTimerRef.current) {
                    clearTimeout(longPressTimerRef.current);
                    longPressTimerRef.current = null;
                }
            };

            const handleTouchEnd = (kanjiItem, e) => {
                if (longPressTimerRef.current) {
                    clearTimeout(longPressTimerRef.current);
                    longPressTimerRef.current = null;
                }
                if (!isLongPressedRef.current && !isScrolling && kanjiItem) {
                    speakWithSettings(kanjiItem.char, settings);
                    setSelectedKanji(kanjiItem);
                    setView('practice');
                }
            };

            useEffect(() => {
                const load = async () => {
                    const savedSettings = await db.settings.get(currentUser.id);
                    if (savedSettings) setSettings(prev => ({ ...prev, ...savedSettings }));

                    const shots = await db.bestShots.where('userId').equals(currentUser.id).toArray();
                    if (shots.length > 0) {
                        const map = {};
                        shots.forEach(s => map[s.char] = s);
                        setBestShots(map);
                        prevTotalRef.current = shots.length;

                        const reads = await db.readWords.where('userId').equals(currentUser.id).toArray();
                        setReadWords(reads.map(r => r.wordId));

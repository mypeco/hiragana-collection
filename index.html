            try {

                const notes = [1800, 2400, 3000, 3800, 2800, 3500];
                notes.forEach((freq, i) => {
                    const o = ac.createOscillator();
                    const g = ac.createGain();
                    o.connect(g); g.connect(ac.destination);
                    o.type = 'triangle';
                    const t = ac.currentTime + i * 0.055;
                    o.frequency.setValueAtTime(freq * 0.85, t);
                    o.frequency.exponentialRampToValueAtTime(freq * 1.1, t + 0.06);
                    g.gain.setValueAtTime(0, t);
                    g.gain.linearRampToValueAtTime(0.15, t + 0.02);
                    g.gain.exponentialRampToValueAtTime(0.001, t + 0.22);
                    o.start(t); o.stop(t + 0.25);
                });
            } catch(e) {}

        const fetchKanaVGPaths = async (char) => {
            if (typeof KANJIVG_CACHE !== 'undefined' && KANJIVG_CACHE[char]) {
                return KANJIVG_CACHE[char];
            }
            const unicode = char.charCodeAt(0).toString(16).padStart(5, '0');
            const url = `https://cdn.jsdelivr.net/gh/KanjiVG/kanjivg@master/kanji/${unicode}.svg`;
            try {
                const res = await fetch(url);
                if (!res.ok) throw new Error('Fetch error');
                const text = await res.text();
                const parser = new DOMParser();
                const doc = parser.parseFromString(text, 'image/svg+xml');
                
                const pathsGroup = doc.querySelector('g[id^="kvg:StrokePaths"]');
                if (!pathsGroup) return null;

                const rootKanjiGroup = pathsGroup.firstElementChild;
                if (!rootKanjiGroup) return null;

                const result = [];
                const paths = pathsGroup.querySelectorAll('path');
                const groupMap = new Map();
                let groupIndex = 0;

                paths.forEach(p => {
                    let targetNode = p;
                    while (targetNode && targetNode.parentElement !== rootKanjiGroup) {
                        targetNode = targetNode.parentElement;
                    }
                    if (!groupMap.has(targetNode)) {
                        groupMap.set(targetNode, groupIndex++);
                    }
                    result.push({ d: p.getAttribute('d'), groupId: groupMap.get(targetNode) });
                });
                return result;
            } catch (error) { return null; }
        };

        const KanaPath = ({ d, status, strokeWidth = "5", drawnColor = "#1f2937" }) => {
            const pathRef = useRef(null);
            const [length, setLength] = useState(200); 

            useEffect(() => {
                if (pathRef.current) {
                    const actualLength = pathRef.current.getTotalLength();
                    if (actualLength > 0) setLength(actualLength);
                }
            }, [d]);

            const dynamicStyle = { '--path-length': length, strokeDasharray: length };
            if (status !== 'animating') dynamicStyle.strokeDashoffset = status === 'drawn' ? 0 : length;
            
            let strokeColor = 'transparent';
            if (status === 'drawn') strokeColor = drawnColor;
            if (status === 'animating') strokeColor = '#f97316'; 

            return <path ref={pathRef} d={d} className={`stroke-path ${status === 'animating' ? 'stroke-animating' : ''}`} stroke={strokeColor} strokeWidth={strokeWidth} style={dynamicStyle} />;
        };

        const AnimatedKana = ({ paths, strokes, multiColor, onComplete }) => {
            const [status, setStatus] = useState('idle');
            const [currentStroke, setCurrentStroke] = useState(-1);
            
            const play = () => { 
                if (status !== 'playing') { setStatus('playing'); setCurrentStroke(0); } 
            };
            
            useEffect(() => { setStatus('idle'); setCurrentStroke(-1); }, [paths]);
            
            useEffect(() => {
                if (status === 'playing') {
                    if (currentStroke < paths.length) {
                        const timer = setTimeout(() => setCurrentStroke(prev => prev + 1), 1300); 
                        return () => clearTimeout(timer);
                    } else {
                        setStatus('done');
                        if (onComplete) onComplete();
                        const resetTimer = setTimeout(() => { setStatus('idle'); setCurrentStroke(-1); }, 2000); 
                        return () => clearTimeout(resetTimer);
                    }
                }
            }, [status, currentStroke, paths.length, onComplete]);

            return (
                <div className="flex flex-col items-center gap-2 w-full">
                    <div className="w-full aspect-square bg-white rounded-xl shadow-md border-4 border-orange-200 flex items-center justify-center relative p-0">
                        <div className="absolute inset-0 pointer-events-none opacity-50 z-0">
                            <div className="absolute top-1/2 w-full border-t-2 border-dashed border-red-300"></div>
                            <div className="absolute left-1/2 h-full border-l-2 border-dashed border-red-300"></div>
                        </div>
                        <span className="absolute top-1 left-1 text-[10px] text-red-500 bg-white px-1 rounded border border-red-200 z-20 font-bold">{strokes}かく</span>
                        
                        <svg viewBox="4 4 101 101" className="w-full h-full relative z-10">
                            {paths.map((p, i) => (
                                <path key={`guide-${i}`} d={p.d} className="stroke-path" strokeWidth="6" 
                                      stroke={multiColor ? PART_COLORS[p.groupId % PART_COLORS.length] : '#e5e7eb'} 
                                      opacity={multiColor ? "0.3" : "1"} />
                            ))}
                            {paths.map((p, i) => {
                                let pathStatus = 'undrawn';
                                if (status === 'idle' || status === 'done') pathStatus = 'drawn';
                                else if (status === 'playing') {
                                    if (i < currentStroke) pathStatus = 'drawn';
                                    else if (i === currentStroke) pathStatus = 'animating';
                                }
                                const drawnColor = multiColor ? PART_COLORS[p.groupId % PART_COLORS.length] : '#1f2937';
                                return <KanaPath key={`stroke-${i}`} d={p.d} status={pathStatus} strokeWidth="5" drawnColor={drawnColor} />;
                            })}
                        </svg>
                    </div>
                    <button onClick={play} disabled={status === 'playing'} className={`flex items-center justify-center gap-1 w-full py-2 rounded-full font-bold shadow-sm transition-transform ${status === 'playing' ? 'bg-stone-100 text-stone-400 cursor-not-allowed' : 'bg-sky-500 text-white active:scale-95 hover:bg-sky-600 shadow-md'}`}>
                        <Play className="w-4 h-4 fill-current" />
                        <span className="text-xs">{status === 'playing' ? 'さいせいちゅう' : 'さいせい'}</span>
                    </button>
                </div>
            );
        };

        // =====================================================
        // ▼ PracticeStudio
        // =====================================================
        const PracticeStudio = ({ currentUser, targetKanji, settings, onBack, onSaveBest, onSaveComplete, onOpenAdmin, onToggleSound }) => {
            const [isGuideWatched, setIsGuideWatched] = useState(false);
            const hand = settings.hand || 'right'; 
            
            const [practiceMode, setPracticeMode] = useState('trace'); 
            const isTestMode = practiceMode === 'test';
            
            const [sessionLogs, setSessionLogs] = useState({ trace: 0, blank: 0, test: 0 });
            const [strokeWarning, setStrokeWarning] = useState(false); 

            const [practices, setPractices] = useState([]);
            const [isAnimating, setIsAnimating] = useState(false);
            const [lastWrittenImage, setLastWrittenImage] = useState(null);
            const [hasDrawn, setHasDrawn] = useState(false);
            const [svgPaths, setSvgPaths] = useState(null);
            const [isLoadingPaths, setIsLoadingPaths] = useState(true);
            const [savingId, setSavingId] = useState(null); 
            
            const isCanvasLocked = settings.requireGuide && practices.length === 0 && !isGuideWatched;

            const [flyingCard, setFlyingCard] = useState({ active: false, image: null, startX: 0, startY: 0, tx: 0, ty: 0, flying: false });

            const allStrokesRef = useRef([]); 
            const currentStrokeRef = useRef([]);
            const canvasRef = useRef(null);
            const contextRef = useRef(null);
            const isDrawingRef = useRef(false);
            const canvasContainerRef = useRef(null);
            const practicesStripRef = useRef(null);
            const audioCtxRef = useRef(null);
            const noiseSourceRef = useRef(null);
            const noiseGainRef = useRef(null);

            // ① 各モードの目標回数をコンポーネントレベルで定義
            const traceTarget = settings.traceTarget ?? 3;
            const blankTarget = settings.blankTarget ?? 2;
            const testTarget  = settings.testTarget  ?? 1;

            // ① isGoalReached：全モードの目標をクリアしたら true
            const isGoalReached = 
                (traceTarget === 0 || sessionLogs.trace >= traceTarget) &&
                (blankTarget === 0 || sessionLogs.blank >= blankTarget) &&
                (testTarget  === 0 || sessionLogs.test  >= testTarget);

            useEffect(() => {
                const loadData = async () => {
                    let savedPractices = await db.practices.where({ userId: currentUser.id, char: targetKanji.char }).toArray();
                    if (savedPractices.length === 0) {
                        const pastBest = await db.bestShots.get({ userId: currentUser.id, char: targetKanji.char });
                        if (pastBest) savedPractices = [pastBest];
                    }
                    setPractices(savedPractices);
                };
                loadData();
            }, [targetKanji.char, currentUser.id]);

            const adjustCanvasSize = () => {
                const canvas = canvasRef.current;
                if (!canvas) return;
                const rect = canvas.getBoundingClientRect();
                const dpr = window.devicePixelRatio || 1;
                if (Math.abs(canvas.width - rect.width * dpr) > 1 || canvas.width === 0) {
                    canvas.width = rect.width * dpr;
                    canvas.height = rect.height * dpr;
                    const ctx = canvas.getContext('2d');
                    ctx.scale(dpr, dpr);
                    ctx.lineCap = 'round';
                    ctx.lineJoin = 'round';
                    ctx.strokeStyle = '#333';
                    ctx.lineWidth = 8;
                    contextRef.current = ctx;
                }
            };

            useEffect(() => {
                setTimeout(adjustCanvasSize, 150);
                const canvas = canvasRef.current;
                const prevent = (e) => e.target === canvas && e.preventDefault();
                document.body.addEventListener('touchmove', prevent, { passive: false });
                return () => document.body.removeEventListener('touchmove', prevent);
            }, [targetKanji]);

            const getPos = (e) => {
                const rect = canvasRef.current.getBoundingClientRect();
                const clientX = e.touches ? e.touches[0].clientX : e.clientX;
                const clientY = e.touches ? e.touches[0].clientY : e.clientY;
                const rawX = clientX - rect.left;
                const rawY = clientY - rect.top;
                const normX = (rawX / rect.width) * 200;
                const normY = (rawY / rect.height) * 200;
                return { rawX, rawY, normX, normY };
            };

            const start = (e) => { 
                if (isCanvasLocked) return;
                adjustCanvasSize(); 
                const { rawX, rawY, normX, normY } = getPos(e); 
                contextRef.current.beginPath(); 
                contextRef.current.moveTo(rawX, rawY); 
                isDrawingRef.current = true; 
                if (!hasDrawn) setHasDrawn(true);
                currentStrokeRef.current = [{ x: Math.round(normX), y: Math.round(normY) }];
            };

            const move = (e) => { 
                if (!isDrawingRef.current) return; 
                const { rawX, rawY, normX, normY } = getPos(e); 
                contextRef.current.lineTo(rawX, rawY); 
                contextRef.current.stroke(); 
                const lastPoint = currentStrokeRef.current[currentStrokeRef.current.length - 1];
                if (!lastPoint || Math.hypot(lastPoint.x - normX, lastPoint.y - normY) > 2) {
                    currentStrokeRef.current.push({ x: Math.round(normX), y: Math.round(normY) });
                }
            };

            const end = () => { 
                if (!isDrawingRef.current) return;
                contextRef.current.closePath(); 
                isDrawingRef.current = false; 
                if (currentStrokeRef.current.length > 0) {
                    allStrokesRef.current.push(currentStrokeRef.current);
                    currentStrokeRef.current = [];
                }
            };

            const clear = () => { 
                if (hasDrawn) {
                    setSessionLogs(prev => ({ ...prev, [practiceMode]: prev[practiceMode] + 1 }));
                }
                contextRef.current.clearRect(0, 0, canvasRef.current.width, canvasRef.current.height); 
                setHasDrawn(false);
                allStrokesRef.current = [];
                currentStrokeRef.current = [];
            };

            useEffect(() => {
                let isMounted = true;
                setIsLoadingPaths(true);
                fetchKanaVGPaths(targetKanji.char).then(paths => {
                    if (isMounted) { setSvgPaths(paths); setIsLoadingPaths(false); }
                });
                return () => { isMounted = false; };
            }, [targetKanji.char]);

            const playDoneSound = () => {
                try {
                    const ac = new (window.AudioContext || window.webkitAudioContext)();
                    const notes = [2400, 3200, 4100];
                    notes.forEach((freq, i) => {
                        const o = ac.createOscillator();
                        const g = ac.createGain();
                        o.connect(g); g.connect(ac.destination);
                        o.type = 'triangle';
                        const t = ac.currentTime + i * 0.07;
                        o.frequency.setValueAtTime(freq * 0.7, t);
                        o.frequency.exponentialRampToValueAtTime(freq, t + 0.03);
                        o.frequency.exponentialRampToValueAtTime(freq * 1.15, t + 0.1);
                        g.gain.setValueAtTime(0, t);
                        g.gain.linearRampToValueAtTime(0.22, t + 0.02);
                        g.gain.exponentialRampToValueAtTime(0.001, t + 0.18);
                        o.start(t); o.stop(t + 0.2);
                    });
                    const o2 = ac.createOscillator();
                    const g2 = ac.createGain();
                    o2.connect(g2); g2.connect(ac.destination);
                    o2.type = 'sine';
                    const t2 = ac.currentTime + 0.5;
                    o2.frequency.setValueAtTime(700, t2);
                    o2.frequency.exponentialRampToValueAtTime(450, t2 + 0.15);
                    g2.gain.setValueAtTime(0.35, t2);
                    g2.gain.exponentialRampToValueAtTime(0.001, t2 + 0.2);
                    o2.start(t2); o2.stop(t2 + 0.22);
                } catch(e) {}
            };

            const handleFinish = async (skipCheck = false) => {
                if(isAnimating || !hasDrawn) return;
                
                if (!skipCheck) {
                    const actualStrokes = allStrokesRef.current.length;
                    const requiredStrokes = targetKanji.strokes - 1;
                    if (actualStrokes < requiredStrokes) {
                        setStrokeWarning(true);
                        return;
                    }
                }
                
                const strokes = [...allStrokesRef.current]; 
                const dataUrl = canvasRef.current.toDataURL('image/png');
                const currentLogs = { ...sessionLogs, [practiceMode]: sessionLogs[practiceMode] + 1 };
                
                setIsAnimating(true);

                try {
                    const columnName = `${practiceMode}_count`;
                    await supabaseClient.rpc('increment_practice_count', { 
                        p_user_id: currentUser.id, 
                        p_char: targetKanji.char, 
                        p_column: columnName 
                    });
                } catch (err) {
                    console.error("Supabase保存エラー:", err);
                }

                const newPractice = {
                    userId: currentUser.id,
                    char: targetKanji.char,
                    image: dataUrl,
                    strokes: strokes, 
                    type: practiceMode, 
                    logs: currentLogs,  
                    timestamp: Date.now()
                };

                const id = await db.practices.add(newPractice);
                setStrokeWarning(false);
                setLastWrittenImage(dataUrl);

                const canvasRect = canvasRef.current.getBoundingClientRect();
                const stripRect = practicesStripRef.current ? practicesStripRef.current.getBoundingClientRect() : null;
                const targetCardW = 80;
                const scale = targetCardW / canvasRect.width;
                const srcCX = canvasRect.left + canvasRect.width / 2;
                const srcCY = canvasRect.top + canvasRect.height / 2;
                let destCX = srcCX, destCY = srcCY - 140;
                if (stripRect) {
                    destCX = stripRect.left + 48 + targetCardW / 2;
                    destCY = stripRect.top + stripRect.height / 2;
                }
                const tx = destCX - srcCX;
                const ty = destCY - srcCY;

                if (settings.soundEnabled !== false) playDoneSound();
                setFlyingCard({ active: true, image: dataUrl, startX: canvasRect.left, startY: canvasRect.top, w: canvasRect.width, h: canvasRect.height, tx, ty, scale, flying: false });
                
                requestAnimationFrame(() => requestAnimationFrame(() => {
                    setFlyingCard(prev => ({ ...prev, flying: true }));
                }));

                setTimeout(() => {
                    setFlyingCard({ active: false, image: null, startX: 0, startY: 0, w: 60, h: 60, tx: 0, ty: 0, scale: 1, flying: false });
                    setPractices(prev => [{ ...newPractice, id }, ...prev]);
                    setIsAnimating(false);
                    setHasDrawn(false); 
                    contextRef.current.clearRect(0, 0, canvasRef.current.width, canvasRef.current.height); 
                    allStrokesRef.current = [];
                    currentStrokeRef.current = [];
                    setSessionLogs(currentLogs);

                    // ▼ 自動モード遷移
                    const nextMode = (() => {
                        if (practiceMode === 'trace' && traceTarget > 0 && currentLogs.trace >= traceTarget) {
                            if (blankTarget > 0) return 'blank';
                            if (testTarget  > 0) return 'test';
                        }
                        if (practiceMode === 'blank' && blankTarget > 0 && currentLogs.blank >= blankTarget) {
                            if (testTarget > 0) return 'test';
                        }
                        return null;
                    })();
                    if (nextMode) setPracticeMode(nextMode);
                }, 800); 
            };

            const completionLevel = settings.completionLevel || 1;

            const canSelect = (type) => {
                if (completionLevel === 3 && type !== 'test') return false; 
                if (completionLevel === 2 && type === 'trace') return false; 
                return true; 
            };

            const traceTheme = COLOR_OPTIONS.find(c=>c.id===settings.traceColor) || COLOR_OPTIONS[0];
            const blankTheme = COLOR_OPTIONS.find(c=>c.id===settings.blankColor) || COLOR_OPTIONS[1];
            const testTheme = COLOR_OPTIONS.find(c=>c.id===settings.testColor) || COLOR_OPTIONS[3];

            const borderColor = practiceMode === 'trace' ? traceTheme.hex : 
                                practiceMode === 'blank' ? blankTheme.hex : 
                                testTheme.hex; 

            const unlockText = completionLevel === 3 ? "「みないで」からえらぼう！" : 
                               completionLevel === 2 ? "「おてほん」「みないで」からえらぼう！" : 
                               "えらべるよ！";

            return (
                <div className="flex flex-col h-screen w-full max-w-4xl mx-auto bg-[#fdfbf7] overflow-hidden">
                    <div className="pt-3 pb-2 flex flex-col items-center z-10 shrink-0 transition-colors duration-500">
                        
                        <div className="w-full flex justify-between items-start mb-2 px-3 gap-2">
                            <div className="flex flex-col gap-2 shrink-0">
                                <button onClick={onBack} className="text-stone-500 flex items-center gap-1 text-sm bg-white px-3 py-1.5 rounded-full mt-1 hover:bg-amber-50 border border-stone-200 shadow-sm active:scale-95 transition-all"><span className="text-base leading-none">🏠</span> もどる</button>
                                <div className="flex gap-2">
                                    <a href="admin.html" onClick={(e) => { e.preventDefault(); onOpenAdmin(); }} className="text-stone-500 flex items-center justify-center text-xl bg-white w-10 h-10 rounded-full hover:bg-amber-50 border border-stone-200 shadow-sm active:scale-95 transition-all leading-none">⚙️</a>
                                    <button
                                        onClick={() => onToggleSound()}
                                        title={settings.soundEnabled !== false ? "おとをけす" : "おとをならす"}
                                        className="text-stone-500 flex items-center justify-center text-xl bg-white w-10 h-10 rounded-full hover:bg-amber-50 border border-stone-200 shadow-sm active:scale-95 transition-all leading-none"
                                    >
                                        {settings.soundEnabled !== false ? '🔔' : '🔕'}
                                    </button>
                                </div>
                            </div>
                            
                            <div className="flex-1 flex justify-center">
                                <div className="flex items-center gap-3 md:gap-6 bg-white px-4 py-3 md:px-8 md:py-4 rounded-3xl shadow-md border-2 border-amber-200 max-w-2xl w-full">
                                    
                                    <div className={`relative shrink-0 pr-3 md:pr-6 py-1 md:py-2 ${isTestMode ? 'border-transparent' : 'border-r-2 border-dashed border-stone-200'}`}>
                                        <div className="text-4xl sm:text-5xl md:text-6xl font-kyokasho text-stone-800 font-bold leading-none tracking-widest">【{targetKanji.char}】</div>
                                        {isTestMode && (
                                            <div className="absolute -inset-y-1 -left-2 -right-3 md:-inset-y-2 md:-right-4 bg-stone-100 rounded-xl flex items-center justify-center text-stone-400 z-10 border border-stone-200 shadow-inner">
                                                <span className="text-2xl md:text-3xl grayscale opacity-50">🙈</span>
                                            </div>
                                        )}
                                    </div>

                                    <div className="flex items-center gap-2 md:gap-4 min-w-0 flex-1 relative">
                                        <span className="text-4xl sm:text-5xl md:text-6xl shrink-0 drop-shadow-sm relative z-20">{targetKanji.icon}</span>
                                        <div className="flex flex-wrap items-end gap-1 min-w-0 relative flex-1">
                                            <span className="text-xl sm:text-2xl md:text-3xl font-kyokasho text-stone-700 font-bold tracking-widest break-words leading-tight">
                                                {targetKanji.word}
                                            </span>
                                            {isTestMode && (
                                                <div className="absolute -inset-y-2 -left-2 -right-2 bg-stone-100 rounded-xl flex items-center justify-center text-stone-400 z-10 border border-stone-200 shadow-inner">
                                                    <span className="text-xl md:text-2xl grayscale opacity-50">🙈</span>
                                                </div>
                                            )}
                                        </div>
                                    </div>
                                    
                                </div>
                            </div>
                            <div className="w-20 shrink-0"></div> 
                        </div>

                        {/* ▼ 練習ストリップ ① 新しい進捗バッジ */}
                        <div ref={practicesStripRef} className={`w-[95%] h-36 md:h-44 rounded-2xl p-3 md:p-4 flex gap-3 overflow-x-auto relative items-center transition-all duration-500 ${isGoalReached ? 'bg-gradient-to-br from-amber-50 to-orange-50 border-4 border-amber-400 shadow-lg' : 'bg-white border-4 border-amber-200 shadow-sm'}`}
                            style={isGoalReached ? { boxShadow: '0 0 0 4px #fde68a44, 0 4px 24px #fbbf2420' } : {}}>
                            
                            {practices.length === 0 && (
                                <div className="w-full h-full flex flex-col items-center justify-center gap-2 text-amber-400">
                                    <span className="text-3xl opacity-50">✍️</span>
                                    <span className="text-sm font-bold text-amber-500/70">かいた文字がここに集まるよ！</span>
                                </div>
                            )}
                            
                            {/* ゴール達成バッジ */}
                            {isGoalReached && practices.length > 0 && (
                                <div className="absolute top-0 left-0 text-white text-[10px] md:text-xs font-bold px-2 md:px-3 py-0.5 md:py-1 rounded-br-xl z-20 flex items-center gap-1 shadow"
                                    style={{ background: 'linear-gradient(90deg, #f59e0b, #f97316)' }}>
                                    <Unlock className="w-3 h-3 md:w-4 md:h-4"/> {unlockText}
                                </div>
                            )}
                            
                            {/* ① モード別進捗バッジ */}
                            {!isGoalReached && (
                                <div className="absolute top-0 left-0 bg-stone-500/80 text-white text-[9px] md:text-[10px] font-bold px-2 py-1 rounded-br-xl z-20 flex items-center gap-1.5 shadow">
                                    <Lock className="w-3 h-3 shrink-0"/>
                                    {traceTarget > 0 && (
                                        <span className={`px-1 py-0.5 rounded ${sessionLogs.trace >= traceTarget ? 'text-green-300' : 'text-white/80'}`}>
                                            ✏️{sessionLogs.trace}/{traceTarget}
                                        </span>
                                    )}
                                    {blankTarget > 0 && (
                                        <span className={`px-1 py-0.5 rounded ${sessionLogs.blank >= blankTarget ? 'text-green-300' : 'text-white/80'}`}>
                                            📝{sessionLogs.blank}/{blankTarget}
                                        </span>
                                    )}
                                    {testTarget > 0 && (
                                        <span className={`px-1 py-0.5 rounded ${sessionLogs.test >= testTarget ? 'text-green-300' : 'text-white/80'}`}>
                                            ⭐{sessionLogs.test}/{testTarget}
                                        </span>
                                    )}
                                </div>
                            )}

                            {practices.map((p, i) => {
                                const isSelectable = canSelect(p.type);
                                const colorTheme = p.type === 'trace' ? traceTheme : 
                                                   p.type === 'blank' ? blankTheme : testTheme;
                                
                                return (
                                    <div key={p.id} 
                                        onClick={(e) => {
                                            if (isGoalReached && isSelectable && !savingId) {
                                                setSavingId(p.id);
                                                speakWithSettings(targetKanji.char, settings);
                                                if (navigator.vibrate) navigator.vibrate([30, 50]); 
                                                setTimeout(async () => {
                                                    await onSaveBest(targetKanji.char, p);
                                                    onSaveComplete(targetKanji.char);
                                                }, 500); 
                                            }
                                        }}
                                        className={`flex-shrink-0 w-20 h-20 md:w-28 md:h-28 bg-white rounded-xl border-2 p-1 transition-all duration-300 relative mt-4 shadow-sm
                                            ${isGoalReached && isSelectable && !savingId ? 'cursor-pointer hover:-translate-y-2 hover:shadow-xl ' + colorTheme.class : ''}
                                            ${savingId === p.id ? 'scale-90 ring-4 shadow-inner z-50 opacity-90 ' + colorTheme.class : ''} 
                                            ${savingId && savingId !== p.id ? 'opacity-0 scale-50' : ''}
                                            ${!isGoalReached || !isSelectable ? 'opacity-40 grayscale border-stone-200' + (!isSelectable && isGoalReached ? ' cursor-not-allowed' : '') : ''}`}>
                                        
                                        <div className="w-full h-full p-1">
                                            <SvgStroke strokes={p.strokes} strokeWidth={10} color="#374151" />
                                        </div>
                                        
                                        {p.type === 'trace' && <span className="absolute -bottom-2.5 left-1/2 -translate-x-1/2 text-[9px] font-bold text-sky-600 bg-sky-50 px-1.5 border border-sky-200 rounded-full whitespace-nowrap shadow-sm">なぞり</span>}
                                        {p.type === 'blank' && <span className="absolute -bottom-2.5 left-1/2 -translate-x-1/2 text-[9px] font-bold text-green-700 bg-green-50 px-1.5 border border-green-200 rounded-full whitespace-nowrap shadow-sm">おてほん</span>}
                                        {p.type === 'test' && <span className="absolute -bottom-2.5 left-1/2 -translate-x-1/2 text-[9px] font-bold text-purple-700 bg-purple-50 px-1.5 border border-purple-200 rounded-full whitespace-nowrap shadow-sm">みないで</span>}
                                    </div>
                                )
                            })}
                         </div>
                    </div>

                    <div className="flex-1 flex flex-col p-2 md:p-4 w-full">
                        <div className={`mt-auto pt-8 flex items-center justify-center gap-4 md:gap-10 w-full px-4 ${hand === 'left' ? 'flex-row-reverse' : 'flex-row'}`}>
                            
                            <div className="relative w-40 md:w-56 shrink-0">
                                <span className="absolute -top-6 left-1/2 -translate-x-1/2 text-gray-500 text-xs font-bold whitespace-nowrap">おてほん</span>
                                
                                {isTestMode && (
                                    <div className="absolute inset-0 z-30 bg-gray-100 rounded-xl flex flex-col items-center justify-center border-4 border-gray-200 shadow-inner">
                                        <span className="text-4xl mb-2 grayscale opacity-50">🙈</span>
                                        <span className="text-gray-400 font-bold text-xs md:text-sm text-center">みないで<br/>かけるかな？</span>
                                    </div>
                                )}
                                
                                {isLoadingPaths ? (
                                    <div className="w-full aspect-square bg-white rounded-xl shadow-md border-4 border-orange-200 flex flex-col items-center justify-center text-sky-400">
                                        <Loader className="w-8 h-8 mb-2" />
                                    </div>
                                ) : svgPaths ? (
                                    <AnimatedKana paths={svgPaths} strokes={targetKanji.strokes} multiColor={settings.partColor} onComplete={() => setIsGuideWatched(true)} />
                                ) : (
                                    <div className="w-full aspect-square bg-white rounded-xl shadow-md border-4 border-orange-200 flex items-center justify-center text-[5rem] md:text-[8rem] font-kyokasho text-black leading-none select-none relative z-10">
                                        <span className="-translate-y-2">{targetKanji.char}</span>
                                        <span className="absolute top-1 left-1 text-[10px] text-red-500 bg-white px-1 rounded border border-red-200 z-20 font-bold">{targetKanji.strokes}かく</span>
                                    </div>
                                )}
                            </div>

                            <div ref={canvasContainerRef} className="relative group w-56 md:w-80 shrink-0">
                                <span className="absolute -top-6 left-2 text-gray-500 text-xs font-bold whitespace-nowrap">ここに かこう！</span>
                                
                                <div className="absolute -top-10 right-0 flex bg-white rounded-full shadow-sm border p-0.5 z-20 overflow-hidden">
                                    {(() => {
                                        const traceDone   = sessionLogs.trace;
                                        const blankDone   = sessionLogs.blank;
                                        const testDone    = sessionLogs.test;
                                        const modeBtn = (mode, label, theme, target, done) => {
                                            const remaining = target > 0 ? Math.max(0, target - done) : null;
                                            const finished  = target > 0 && done >= target;
                                            return (
                                                <button key={mode} onClick={() => !hasDrawn && setPracticeMode(mode)} disabled={hasDrawn}
                                                    className={`relative px-3 py-1 rounded-full text-xs font-bold transition-all ${practiceMode !== mode ? 'text-gray-400 hover:bg-gray-50' : ''} ${hasDrawn ? 'opacity-30 cursor-not-allowed' : ''}`}
                                                    style={practiceMode === mode ? { backgroundColor: `${theme.hex}22`, color: theme.hex } : {}}
                                                >
                                                    {label}
                                                    {target > 0 && (
                                                        <span className={`ml-1 text-[10px] font-bold px-1 py-0.5 rounded-full ${finished ? 'bg-green-100 text-green-600' : 'bg-stone-100 text-stone-400'}`}>
                                                            {finished ? '✓' : `あと${remaining}`}
                                                        </span>
                                                    )}
                                                </button>
                                            );
                                        };
                                        return (<>
                                            {modeBtn('trace', 'なぞり',   traceTheme, traceTarget, traceDone)}
                                            {modeBtn('blank', 'おてほん', blankTheme, blankTarget, blankDone)}
                                            {modeBtn('test',  'みないで', testTheme,  testTarget,  testDone)}
                                        </>);
                                    })()}
                                </div>

                                <div className="relative w-full aspect-square bg-white rounded-2xl shadow-xl border-4 overflow-hidden cursor-crosshair transition-colors duration-300" style={{ borderColor: borderColor }}>
                                    {practiceMode === 'trace' && (() => {
                                        const isSmall = ['ゃ','ゅ','ょ','っ'].includes(targetKanji.char);
                                        return (
                                            <div className={`absolute pointer-events-none select-none z-0 flex items-center justify-center ${isSmall ? 'left-0 bottom-0 w-1/2 h-1/2 p-1' : 'inset-0 p-1'}`}>
                                                {svgPaths
                                                    ? <svg viewBox="4 4 101 101" className="w-full h-full opacity-30">{svgPaths.map((p, i) => <path key={i} d={p.d} className="stroke-path stroke-guide" strokeWidth="6" stroke={settings.partColor ? PART_COLORS[p.groupId % PART_COLORS.length] : '#e5e7eb'} opacity={settings.partColor ? "0.4" : "1"} />)}</svg>
                                                    : <div className="font-kyokasho text-gray-200 leading-none" style={{fontSize: isSmall ? '4rem' : '14rem'}}><span>{targetKanji.char}</span></div>
                                                }
                                            </div>
                                        );
                                    })()}
                                    
                                    {!isTestMode && (
                                        <div className="absolute inset-0 pointer-events-none opacity-50 z-0">
                                            <div className="absolute top-1/2 w-full border-t-2 border-dashed border-red-300"></div>
                                            <div className="absolute left-1/2 h-full border-l-2 border-dashed border-red-300"></div>
                                        </div>
                                    )}
                                    <canvas ref={canvasRef} className="absolute inset-0 w-full h-full touch-none z-10" onMouseDown={start} onMouseMove={move} onMouseUp={end} onMouseLeave={end} onTouchStart={start} onTouchMove={move} onTouchEnd={end} />
                                    
                                    {isCanvasLocked && (
                                        <div className="absolute inset-0 z-30 bg-white/80 backdrop-blur-sm flex flex-col items-center justify-center rounded-2xl border-4 border-dashed border-sky-300 animate-fade-in"><Lock className="w-12 h-12 text-sky-400 mb-2" /><span className="text-sky-700 font-bold text-sm text-center px-4 bg-white/90 py-2 rounded-xl shadow-sm">まずは 左のおてほんを<br/>「さいせい」して見てね！</span></div>
                                    )}
                                </div>
                            </div>

                            <div className="flex flex-col items-center justify-center gap-6 md:gap-10 shrink-0 h-full relative">
                                <button onClick={clear} className="flex flex-col items-center gap-1 text-gray-400 hover:text-gray-600 mt-4 md:mt-8">
                                    <div className="w-10 h-10 md:w-12 md:h-12 bg-gray-100 rounded-full flex items-center justify-center shadow-sm">
                                        <Eraser className="w-5 h-5 md:w-6 md:h-6" />
                                    </div>
                                    <span className="text-[10px] md:text-xs font-bold">けす</span>
                                </button>

                                {strokeWarning && (
                                    <div className="fixed inset-0 z-50 flex items-center justify-center bg-gray-900/30 backdrop-blur-sm animate-fade-in p-4">
                                        <div className="bg-white rounded-2xl shadow-2xl border-4 border-red-200 p-6 w-full max-w-sm animate-bounce-in text-center">
                                            <div className="w-16 h-16 bg-red-100 text-red-500 rounded-full flex items-center justify-center mx-auto mb-4">
                                                <span className="text-3xl">⚠️</span>
                                            </div>
                                            <div className="text-red-500 font-bold mb-2 text-lg">画数がちがうみたい！</div>
                                            <p className="text-sm text-gray-600 mb-6 leading-relaxed">
                                                この字は <strong className="text-lg text-gray-800">{targetKanji.strokes}かく</strong> だよ。<br/>
                                                （いま書いたのは {allStrokesRef.current.length}かく）<br/>
                                                もう一回 書いてみる？
                                            </p>
                                            <div className="flex gap-3">
                                                <button onClick={() => { setStrokeWarning(false); clear(); }} className="flex-1 bg-sky-500 text-white font-bold py-3 rounded-xl shadow-md hover:bg-sky-600 active:scale-95 transition-all">かきなおす</button>
                                                <button onClick={() => handleFinish(true)} className="flex-1 bg-gray-100 text-gray-500 font-bold py-3 rounded-xl hover:bg-gray-200 active:scale-95 transition-all text-sm">このままにする</button>
                                            </div>
                                        </div>
                                    </div>
                                )}

                                {flyingCard.active && (
                                    <div style={{
                                        position: 'fixed',
                                        left: flyingCard.startX,
                                        top: flyingCard.startY,
                                        width: flyingCard.w,
                                        height: flyingCard.h,
                                        zIndex: 9999,
                                        pointerEvents: 'none',
                                        borderRadius: 16,
                                        border: '3px solid #fbbf24',
                                        overflow: 'hidden',
                                        boxShadow: '0 8px 32px rgba(0,0,0,0.3)',
                                        transformOrigin: 'center center',
                                        opacity: flyingCard.flying ? 0 : 1,
                                        transform: flyingCard.flying
                                            ? `translate(${flyingCard.tx}px, ${flyingCard.ty}px) rotate(360deg) scale(${flyingCard.scale})`
                                            : 'translate(0,0) rotate(0deg) scale(1)',
                                        transition: flyingCard.flying
                                            ? 'transform 0.42s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.38s ease-in 0.1s'

                                    }}>
                                        <img src={flyingCard.image} style={{width:'100%',height:'100%',objectFit:'contain',background:'white'}} />
                                    </div>
                                )}

                                <button 
                                    onClick={() => handleFinish(false)}
                                    disabled={isAnimating || !hasDrawn} 
                                    className={`flex flex-col items-center justify-center w-14 md:w-20 h-28 md:h-36 rounded-2xl shadow-md border-2 transition-all select-none touch-none mb-4 md:mb-8 gap-1 ${hasDrawn ? 'bg-gradient-to-t from-sky-400 to-sky-300 border-sky-200 text-white hover:brightness-105 active:scale-95 cursor-pointer' : 'bg-gray-100 border-gray-200 text-gray-400 cursor-not-allowed'}`}
                                >
                                    <span className="font-black leading-none" style={{display:'inline-block',transform:'rotate(-90deg)',opacity:0.95,fontSize:'1.1rem',letterSpacing:'-3px'}}>〉〉</span>
                                    <span className="text-sm md:text-base font-bold tracking-widest leading-tight py-1">できた</span>
                                    <span className="font-black leading-none" style={{display:'inline-block',transform:'rotate(-90deg)',opacity:0.3,fontSize:'1.1rem',letterSpacing:'-3px'}}>〉〉</span>
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        const ProfileSelect = ({ onSelect }) => {
            const [users, setUsers] = useState([]);
            const [isCreating, setIsCreating] = useState(false);
            const [editingUser, setEditingUser] = useState(null); 
            const [newName, setNewName] = useState('');
            const [newIcon, setNewIcon] = useState(ICON_OPTIONS[0]);
            const [newColor, setNewColor] = useState(USER_COLOR_OPTIONS[0]);

            const [isLoadingUsers, setIsLoadingUsers] = useState(false);

            useEffect(() => {
                const loadUsers = async () => {
                    setIsLoadingUsers(true);
                    const localUsers = await db.users.toArray();
                    setUsers(localUsers);
                    try {
                        const { data: remoteProfiles } = await supabaseClient.from('profiles').select('*');
                        if (remoteProfiles) {
                            const remoteIds = remoteProfiles.map(p => String(p.id));
                            for (const localUser of localUsers) {
                                if (!remoteIds.includes(String(localUser.id))) {
                                    await db.users.delete(localUser.id);
                                    await db.bestShots.where('userId').equals(localUser.id).delete();
                                    await db.settings.where({ userId: localUser.id }).delete();
                                    await db.readWords.where({ userId: localUser.id }).delete();
                                }
                            }
                            const localIds = localUsers.map(u => String(u.id));
                            const newFromRemote = [];
                            for (const profile of remoteProfiles) {
                                if (!localIds.includes(String(profile.id))) {
                                    const colorObj = USER_COLOR_OPTIONS.find(c => c.label === profile.color_label) || USER_COLOR_OPTIONS[0];
                                    const restoredUser = { id: profile.id, name: profile.name, icon: profile.icon, color: colorObj };
                                    await db.users.put(restoredUser);
                                    newFromRemote.push(restoredUser);
                                }
                            }
                            const updatedUsers = await db.users.toArray();
                            setUsers(updatedUsers);
                        }
                    } catch(e) { console.error("Supabaseユーザー同期エラー:", e); }
                    setIsLoadingUsers(false);
                };
                loadUsers();
            }, []);

            const handleStartCreate = () => {
                setNewName('');
                setNewIcon(ICON_OPTIONS[0]);
                setNewColor(USER_COLOR_OPTIONS[0]);
                setEditingUser(null);
                setIsCreating(true);
            };

            const handleStartEdit = (user, e) => {
                e.stopPropagation();
                setNewName(user.name);
                setNewIcon(user.icon);
                setNewColor(user.color);
                setEditingUser(user);
                setIsCreating(true);
            };

            const handleSave = async () => {
                if (!newName.trim()) return;
                if (editingUser) {
                    const updatedUser = { ...editingUser, name: newName.trim(), icon: newIcon, color: newColor };
                    await db.users.put(updatedUser);
                    setUsers(prev => prev.map(u => u.id === editingUser.id ? updatedUser : u));
                    setIsCreating(false);
                    setEditingUser(null);
                } else {
                    const newUser = { name: newName.trim(), icon: newIcon, color: newColor };
                    const id = await db.users.add(newUser);
                    onSelect({ ...newUser, id });
                }
            };

            const handleDeleteUser = async (userId, userName, e) => {
                e.stopPropagation(); 
                if (window.confirm(`${userName} の データを ぜんぶ けしますか？\n（けした データは もとにもどせません）`)) {
                    await db.users.delete(userId);
                    await db.settings.where({ userId: userId }).delete();
                    await db.practices.where({ userId: userId }).delete();
                    await db.bestShots.where({ userId: userId }).delete();
                    await db.readWords.where({ userId: userId }).delete();

                    try {
                        await supabaseClient
                            .from('profiles')
                            .delete()
                            .eq('id', String(userId));
                        await supabaseClient
                            .from('best_shots')
                            .delete()
                            .eq('user_id', String(userId));
                    } catch(e) {
                        console.error("Supabase削除エラー:", e);
                    }

                    setUsers(prev => prev.filter(u => u.id !== userId));
                }
            };

            if (isCreating) {
                return (
                    <div className="p-6 max-w-md mx-auto min-h-screen flex flex-col items-center justify-center animate-fade-in">
                        <h1 className="text-2xl font-bold mb-6 text-stone-800 font-kyokasho">
                            {editingUser ? 'プロフィールを なおす' : 'あたらしく つくる'}
                        </h1>
                        <input type="text" placeholder="なまえ" value={newName} onChange={e => setNewName(e.target.value)} className="w-full text-center text-2xl p-4 rounded-xl border-4 border-sky-200 focus:border-sky-400 outline-none mb-6 font-kyokasho shadow-sm" />
                        <div className="w-full mb-6">
                            <p className="font-bold text-stone-500 mb-2 text-center">アイコンを えらぶ</p>
                            <div className="grid grid-cols-6 gap-2 h-48 overflow-y-auto p-3 bg-white rounded-xl border-2 border-stone-100 shadow-inner">
                                {ICON_OPTIONS.map(icon => <button key={icon} onClick={() => setNewIcon(icon)} className={`text-3xl p-1 rounded-lg transition-transform ${newIcon === icon ? 'bg-sky-100 ring-4 ring-sky-400 scale-110' : 'hover:bg-stone-50'}`}>{icon}</button>)}
                            </div>
                        </div>
                        <div className="w-full mb-8">
                            <p className="font-bold text-stone-500 mb-3 text-center">テーマカラーを えらぶ</p>
                            <div className="flex gap-4 flex-wrap justify-center">
                                {USER_COLOR_OPTIONS.map(color => <button key={color.label} onClick={() => setNewColor(color)} className={`w-12 h-12 rounded-full ${color.class} ${color.border} shadow-sm border-2 transition-all flex items-center justify-center ${newColor.label === color.label ? 'ring-4 ring-stone-400 scale-110' : 'opacity-50 hover:opacity-100'}`} />)}
                            </div>
                        </div>
                        <div className="flex gap-4 w-full">
                            <button onClick={() => { setIsCreating(false); setEditingUser(null); }} className="flex-1 py-4 rounded-full font-bold text-stone-500 bg-stone-100 active:scale-95 transition-transform">もどる</button>
                            <button onClick={handleSave} disabled={!newName.trim()} className="flex-1 py-4 rounded-full font-bold text-white bg-sky-500 disabled:opacity-50 active:scale-95 shadow-md transition-transform">ほぞんする</button>
                        </div>
                    </div>
                );
            }

            return (
                <div className="p-6 max-w-md mx-auto min-h-screen flex flex-col items-center justify-center animate-fade-in">
                    <h1 className="text-3xl font-bold mb-8 text-sky-700 font-kyokasho">だれが あそぶ？</h1>
                    <div className="w-full space-y-4 mb-8">
                        {users.length === 0 && <div className="text-center text-stone-400 font-bold py-8">まだ だれも いません</div>}
                        {users.map(user => (
                            <div key={user.id} className={`w-full flex items-center justify-between p-4 rounded-2xl shadow-sm border-2 transition-transform hover:-translate-y-1 ${user.color.class} ${user.color.border}`}>
                                <div onClick={() => onSelect(user)} className="flex items-center gap-4 flex-1 cursor-pointer active:scale-95 transition-transform">
                                    <div className="text-4xl bg-white/70 w-16 h-16 flex items-center justify-center rounded-full shadow-sm shrink-0">{user.icon}</div>
                                    <span className="text-2xl font-bold font-kyokasho tracking-widest">{user.name}</span>
                                </div>
                                <div className="flex items-center gap-2 shrink-0 ml-2">
                                    <button onClick={(e) => handleStartEdit(user, e)} className="w-10 h-10 rounded-full bg-white/50 text-stone-500 hover:bg-sky-500 hover:text-white flex items-center justify-center transition-colors shadow-sm" title="プロフィールをなおす">
                                        <EditIcon className="w-5 h-5"/>
                                    </button>
                                    <button onClick={(e) => handleDeleteUser(user.id, user.name, e)} className="w-10 h-10 rounded-full bg-white/50 text-stone-500 hover:bg-red-500 hover:text-white flex items-center justify-center transition-colors shadow-sm" title="このデータをけす">
                                        <X className="w-5 h-5"/>
                                    </button>
                                </div>
                            </div>
                        ))}
                    </div>
                    <button onClick={handleStartCreate} className="flex items-center justify-center gap-2 w-full py-4 rounded-full font-bold text-stone-500 bg-white border-2 border-dashed border-stone-300 hover:bg-stone-50 active:scale-95 transition-transform">
                        <Sparkles className="w-5 h-5"/> あたらしく つくる
                    </button>
                </div>
            );
        };

        const SEION_TABLE = [
            ['あ', 'い', 'う', 'え', 'お'],
            ['か', 'き', 'く', 'け', 'こ'],
            ['さ', 'し', 'す', 'せ', 'そ'],
            ['た', 'ち', 'つ', 'て', 'と'],
            ['な', 'に', 'ぬ', 'ね', 'の'],
            ['は', 'ひ', 'ふ', 'へ', 'ほ'],
            ['ま', 'み', 'む', 'め', 'も'],
            ['や', null, 'ゆ', null, 'よ'],
            ['ら', 'り', 'る', 'れ', 'ろ'],
            ['わ', null, 'を', null, 'ん']
        ];

        const DAKUON_YOUON_TABLE = [
            ['が', 'ぎ', 'ぐ', 'げ', 'ご'],
            ['ざ', 'じ', 'ず', 'ぜ', 'ぞ'],
            ['だ', 'ぢ', 'づ', 'で', 'ど'],
            ['ば', 'び', 'ぶ', 'べ', 'ぼ'],
            ['ぱ', 'ぴ', 'ぷ', 'ぺ', 'ぽ'],
            ['ゃ', 'ゅ', 'ょ', 'っ', null]
        ];

        const emitParticles = async (targetElement) => {
            const rect = targetElement.getBoundingClientRect();
            const centerX = rect.left + rect.width / 2;
            const centerY = rect.top + rect.height / 2;

            targetElement.animate([
                { transform: `scale(1)` },
                { transform: `scale(0.8)` },
                { transform: `scale(1)` }
            ], { duration: 400, easing: "ease-out" });

            const COUNT = 40;
            const stars = []; 
            const starClipPath = "polygon(50% 0%, 61% 35%, 98% 35%, 68% 57%, 79% 91%, 50% 70%, 21% 91%, 32% 57%, 2% 35%, 39% 35%)";

            for (let i = 0; i < COUNT; i++) {
                const star = document.createElement("div"); 
                star.style.position = "fixed";
                star.style.left = `${centerX}px`;
                star.style.top = `${centerY}px`;
                star.style.width = "12px";
                star.style.height = "12px";
                star.style.webkitClipPath = starClipPath;
                star.style.clipPath = starClipPath;
                star.style.pointerEvents = "none";
                star.style.zIndex = "9999"; 
                const hue = 30 + Math.random() * 25; 
                star.style.backgroundColor = `hsl(${hue}, 90%, 60%)`;
                document.body.appendChild(star);
                stars.push(star);
            }

            const animations = stars.map((star) => {
                const angle = 360 * Math.random();
                const dist = 60 + Math.random() * 80; 
                const size = 0.5 + Math.random() * 2; 

                return star.animate([
                    { transform: `translate(-50%, -50%) rotate(${angle}deg) translateX(0px) scale(${size})`, opacity: 1 },
                    { transform: `translate(-50%, -50%) rotate(${angle}deg) translateX(${dist}px) scale(${size})`, opacity: 0 }
                ], { 
                    duration: 600 + 400 * Math.random(), 
                    easing: "ease-out",
                    fill: "forwards" 
                });
            });

            await Promise.all(animations.map((anim) => anim.finished));
            stars.forEach(star => star.remove()); 
        };

        const emitEmojiParticles = (e, emoji) => {
            if (navigator.vibrate) navigator.vibrate(30);
            const rect = e.currentTarget.getBoundingClientRect();
            const startX = rect.left + rect.width / 2;
            const startY = rect.top + rect.height / 2;

            const COUNT = 5;
            for (let i = 0; i < COUNT; i++) {
                const el = document.createElement("div");
                el.innerText = emoji;
                el.style.position = "fixed";
                el.style.left = `${startX}px`;
                el.style.top = `${startY}px`;
                el.style.fontSize = `${24 + Math.random() * 16}px`;
                el.style.pointerEvents = "none";
                el.style.zIndex = "9999";
                el.style.filter = "drop-shadow(0 4px 6px rgba(0,0,0,0.2))";
                document.body.appendChild(el);

                const angle = -Math.PI / 2 + (Math.random() - 0.5) * Math.PI; 
                const velocity = 80 + Math.random() * 60;
                const duration = 1000 + Math.random() * 500;
                
                el.animate([
                    { transform: `translate(-50%, -50%) scale(0.5)`, opacity: 1 },
                    { transform: `translate(calc(-50% + ${Math.cos(angle) * velocity}px), calc(-50% + ${Math.sin(angle) * velocity}px)) scale(2.0)`, opacity: 1, offset: 0.7 },
                    { transform: `translate(calc(-50% + ${Math.cos(angle) * velocity * 1.2}px), calc(-50% + ${Math.sin(angle) * velocity * 1.2}px)) scale(2.2)`, opacity: 0 }
                ], { duration, easing: "ease-out", fill: "forwards" });

                setTimeout(() => el.remove(), duration);
            }
        };

        const WordRegisterModal = ({ wordObj, bestShots, onComplete, settings }) => {
            const allChars = wordObj.word.split('');
            const targetIndices = allChars.reduce((acc, c, i) => { if (isTargetChar(c)) acc.push(i); return acc; }, []);
            const [filled, setFilled] = useState([]);
            const [celebrating, setCelebrating] = useState(false);
            const [slotAnimating, setSlotAnimating] = useState(null);

            const charCount = {};
            targetIndices.forEach(i => { charCount[allChars[i]] = (charCount[allChars[i]] || 0) + 1; });
            const charFilled = {};
            filled.forEach(i => { const c = allChars[i]; charFilled[c] = (charFilled[c] || 0) + 1; });
            const uniqueTargetChars = [...new Set(targetIndices.map(i => allChars[i]))];

            const handleTapCard = (char) => {
                if (celebrating) return;
                const firstEmpty = targetIndices.find(i => allChars[i] === char && !filled.includes(i));
                if (firstEmpty === undefined) return;
                if (navigator.vibrate) navigator.vibrate(30);

                speakWithSettings(char, settings, { rate: 0.8, pitch: 1.2 });

                setSlotAnimating(firstEmpty);
                setTimeout(() => setSlotAnimating(null), 400);

                const newFilled = [...filled, firstEmpty];
                setFilled(newFilled);

                if (newFilled.length === targetIndices.length) {
                    if (navigator.vibrate) navigator.vibrate([50, 60, 80, 60, 120]);
                    setTimeout(() => {
                        setCelebrating(true);
                        speakWithSettings(wordObj.word, settings, { rate: 0.75, pitch: 1.1 });
                    }, 350);
                    setTimeout(() => onComplete(), 2600);
                }
            };

            return (
                <div className="fixed inset-0 z-50 flex items-center justify-center bg-black/50 backdrop-blur-sm animate-fade-in p-4">
                    <div className="relative w-full max-w-lg bg-[#fdfbf7] rounded-3xl shadow-2xl overflow-hidden animate-bounce-in"
                        style={{ paddingBottom: '24px' }}>
                        
                        <div className="w-full h-2 bg-gradient-to-r from-amber-300 via-orange-300 to-amber-300"/>
                        
                        <div className="flex justify-center pt-3 pb-1">
                            <div className="w-10 h-1.5 bg-stone-300 rounded-full"/>
                        </div>

                        <div className="px-6 pb-8 pt-2">
                            <div className="text-center mb-5">
                                <p className="text-xs font-bold text-amber-500 tracking-widest mb-1">✨ あたらしい ことば ✨</p>
                                <div className="text-6xl mb-1">{wordObj.icon}</div>
                                <div className="text-3xl font-kyokasho text-stone-800 tracking-widest font-bold">{wordObj.word}</div>
                            </div>

                            <div className="flex justify-center gap-3 mb-2">
                                {allChars.map((c, i) => {
                                    if (!isTargetChar(c)) {
                                        return (
                                            <div key={i} className="w-14 h-14 flex items-center justify-center text-2xl font-kyokasho text-stone-500 font-bold">{c}</div>
                                        );
                                    }
                                    const isFilled = filled.includes(i);
                                    const shot = bestShots[c];
                                    return (
                                        <div key={i} className={`w-14 h-14 rounded-2xl border-4 transition-all duration-300 overflow-hidden
                                            ${isFilled
                                                ? 'border-amber-400 bg-white shadow-lg'
                                                : 'border-dashed border-amber-300 bg-amber-50/60'}`}>
                                            {isFilled && shot ? (
                                                <div className={slotAnimating === i ? 'animate-slot-pop w-full h-full' : 'w-full h-full'}>
                                                    <SvgStroke strokes={shot.strokes} strokeWidth={9} color="#78350f"/>
                                                </div>
                                            ) : (
                                                <div className="w-full h-full flex items-center justify-center text-amber-300 text-2xl font-kyokasho select-none">{c}</div>
                                            )}
                                        </div>
                                    );
                                })}
                            </div>

                            <p className="text-center text-xs text-stone-400 font-bold mb-6">↑ カードをタップして はめよう！</p>

                            <div className="flex justify-center gap-4 flex-wrap">
                                {uniqueTargetChars.map(char => {
                                    const shot = bestShots[char];
                                    const usedAll = (charFilled[char] || 0) >= charCount[char];
                                    return (
                                        <button key={char}
                                            onClick={() => handleTapCard(char)}
                                            disabled={usedAll}
                                            className={`relative w-16 h-16 rounded-xl border-2 p-1 transition-all
                                                ${usedAll
                                                    ? 'opacity-30 grayscale cursor-not-allowed border-stone-200 bg-stone-50'
                                                    : 'border-amber-400 bg-white shadow-md hover:shadow-xl hover:-translate-y-1 active:scale-90 cursor-pointer'}`}>
                                            {shot && <img src={shot.image} className="w-full h-full object-contain pointer-events-none"/>}
                                            {usedAll && (
                                                <div className="absolute inset-0 flex items-center justify-center text-green-500 text-2xl">✓</div>
                                            )}
                                        </button>
                                    );
                                })}
                            </div>
                        </div>

                        {celebrating && (
                            <div className="absolute inset-0 flex flex-col items-center justify-center bg-gradient-to-b from-amber-50 to-orange-50 animate-celebrate-in z-20 rounded-3xl">
                                <div className="text-7xl mb-3" style={{ animation: 'bounce 0.6s infinite' }}>{wordObj.icon}</div>
                                <div className="text-4xl font-kyokasho text-amber-800 tracking-widest font-bold mb-2">{wordObj.word}</div>
                                <div className="text-lg font-bold text-amber-600 mb-4">ことばずかん に とうろく！</div>
                                <div className="flex gap-2 text-3xl animate-bounce-in">
                                    {['🌟','✨','🎊','✨','🌟'].map((e, i) => (
                                        <span key={i} style={{ animationDelay: `${i * 0.1}s`, display:'inline-block', animation: 'bounce 0.8s infinite' }}>{e}</span>
                                    ))}
                                </div>
                            </div>
                        )}
                    </div>
                </div>
            );
        };

        const MainApp = ({ currentUser, onLogout }) => {
            const [view, setView] = useState('grid');
            const [activeTab, setActiveTab] = useState('home'); 
            const [selectedKanji, setSelectedKanji] = useState(null);
            const [bestShots, setBestShots] = useState({});
            const [settings, setSettings] = useState({ targetCount: 5, traceColor: 'sky', blankColor: 'green', testColor: 'purple', newDuration: 7, partColor: true, requireGuide: true, hand: 'right', hallOfFame: [], soundEnabled: true, traceTarget: 2, blankTarget: 2, testTarget: 1 });
            
            const [newWordAlert, setNewWordAlert] = useState(null);
            const [wordRegisterTarget, setWordRegisterTarget] = useState(null);
            const [readWords, setReadWords] = useState([]);
            const [searchQuery, setSearchQuery] = useState('');
            const [isSearchFocused, setIsSearchFocused] = useState(false);
            const longPressTimerRef = useRef(null);
            const isLongPressedRef = useRef(false);
            const [isScrolling, setIsScrolling] = useState(false);

            const addHallOfFame = (char) => {
                if (navigator.vibrate) navigator.vibrate(50); 
                const current = settings.hallOfFame || [];
                if (current.length < 4) {
                    saveSettingsWrapper({ ...settings, hallOfFame: [...current, char] });
                } else {
                    alert("かざれるのは 4枚 までだよ！");
                }
            };

            const removeHallOfFame = (indexToRemove) => {
                if (navigator.vibrate) navigator.vibrate(50);
                const current = settings.hallOfFame || [];
                saveSettingsWrapper({ ...settings, hallOfFame: current.filter((_, i) => i !== indexToRemove) });
            };

            const handleTouchStart = (char, e) => {
                setIsScrolling(false);
                isLongPressedRef.current = false;
                longPressTimerRef.current = setTimeout(() => {
                    isLongPressedRef.current = true;
                    addHallOfFame(char); 
                }, 500); 
            };

            const handleTouchMove = () => {
                setIsScrolling(true);
                if (longPressTimerRef.current) {
                    clearTimeout(longPressTimerRef.current);
                    longPressTimerRef.current = null;
                }
            };

            const handleTouchEnd = (kanjiItem, e) => {
                if (longPressTimerRef.current) {
                    clearTimeout(longPressTimerRef.current);
                    longPressTimerRef.current = null;
                }
                if (!isLongPressedRef.current && !isScrolling && kanjiItem) {
                    speakWithSettings(kanjiItem.char, settings);
                    setSelectedKanji(kanjiItem);
                    setView('practice');
                    setSearchQuery('');
                }
            };

            useEffect(() => {
                const load = async () => {
                    if (currentUser && typeof supabaseClient !== 'undefined') {
                        try {
                            await supabaseClient.from('profiles').upsert({
                                id: String(currentUser.id),
                                name: currentUser.name,
                                icon: currentUser.icon,
                                color_label: currentUser.color?.label || 'Blue'
                            });
                        } catch(e) { console.error("名簿の同期エラー:", e); }

                        try {
                            const { data: remoteShots } = await supabaseClient
                                .from('best_shots')
                                .select('*')
                                .eq('user_id', String(currentUser.id));

                            if (remoteShots && remoteShots.length > 0) {
                                for (const remote of remoteShots) {
                                    const local = await db.bestShots.get({
                                        userId: currentUser.id,
                                        char: remote.char
                                    });
                                    if (!local || remote.timestamp > local.timestamp) {
                                        await db.bestShots.put({
                                            userId: currentUser.id,
                                            char: remote.char,
                                            strokes: remote.strokes_data,
                                            type: remote.type,
                                            timestamp: remote.timestamp,
                                            image: local?.image || null
                                        });
                                    }
                                }
                            }
                        } catch(e) { console.error("Supabaseからの読み戻しエラー:", e); }
                    }

                    const savedSettings = await db.settings.get(currentUser.id);
                    if (savedSettings) setSettings(prev => ({ ...prev, ...savedSettings }));

                    const shots = await db.bestShots.where('userId').equals(currentUser.id).toArray();
                    const map = {};
                    shots.forEach(s => map[s.char] = s);
                    setBestShots(map);

                    const reads = await db.readWords.where('userId').equals(currentUser.id).toArray();
                    setReadWords(reads.map(r => r.wordId));
                };
                load();
            }, [currentUser]);

            const saveSettingsWrapper = useCallback(async (newSettings) => {
                setSettings(newSettings);
                await db.settings.put({ userId: currentUser.id, ...newSettings });
            }, [currentUser.id]);

            const getUnlockedWords = (shotsMap) => {
                if(typeof WORD_DATA === 'undefined') return [];
                return WORD_DATA.filter(w => {
                    const charsOnly = w.word.split('').filter(isTargetChar);
                    return charsOnly.length > 0 && charsOnly.every(char => shotsMap[char]);
                });
            };

            const saveBestShot = async (char, practiceObj) => {
                const nextShots = { ...bestShots, [char] : practiceObj };
                await db.bestShots.put({ userId: currentUser.id, char: char, ...practiceObj });
                setBestShots(nextShots);

                try {
                    await supabaseClient.from('best_shots').upsert({
                        user_id: currentUser.id,
                        char: char,
                        strokes_data: practiceObj.strokes,
                        type: practiceObj.type,
                        timestamp: practiceObj.timestamp
                    });
                } catch (err) {
                    console.error("Supabase保存エラー:", err);
                }
                await db.practices.where({ userId: currentUser.id, char: char }).delete();
            };

            const handleWordRegistered = async (wordId) => {
                await db.readWords.put({ userId: currentUser.id, wordId: wordId });
                setReadWords(prev => [...prev, wordId]);
                setWordRegisterTarget(null);
            };

            const handleSaveComplete = (char) => {
                setView('grid');
                
                setTimeout(() => {
                    let targetId = `kanji-item-${char}`;
                    if (activeTab === 'home') {
                        targetId = `col-new-${char}`;
                    }

                    const el = document.getElementById(targetId);
                    if (el) {
                        const duration = 800; 
                        const targetY = el.getBoundingClientRect().top + window.scrollY - (window.innerHeight / 2) + (el.offsetHeight / 2);
                        const startY = window.scrollY;
                        const diff = targetY - startY;
                        let startTime = null;

                        const easeOut = (t) => 1 - (--t) * t * t * t;

                        const step = (timestamp) => {
                            if (!startTime) startTime = timestamp;
                            const progress = timestamp - startTime;
                            const percent = Math.min(progress / duration, 1);
                            window.scrollTo(0, startY + diff * easeOut(percent));
                            if (progress < duration) {
                                requestAnimationFrame(step);
                            }
                        };
                        requestAnimationFrame(step);

                        document.querySelectorAll('.highlight-saved').forEach(node => {
                            node.classList.remove('ring-4', 'ring-amber-400', 'bg-amber-50', 'shadow-xl', 'highlight-saved');
                        });

                        el.classList.add('ring-4', 'ring-amber-400', 'bg-amber-50', 'shadow-xl', 'highlight-saved');
                        
                        setTimeout(() => {
                            emitParticles(el);
                            if (settings.soundEnabled !== false) playSharan();
                        }, duration);
                    }
                }, 100);
            };

            const handleWordClick = async (wordObj, e) => {

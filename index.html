        body { overscroll-behavior: none; background-color: #fdfbf7; }
        canvas { touch-action: none; }
        .font-kyokasho { font-family: "UD Digi Kyokasho NK-R", "Klee One", serif; }
        .inner-shadow { box-shadow: inset 0 2px 4px 0 rgba(0, 0, 0, 0.06); }
        
        @keyframes pop-in { 0% { transform: scale(0); } 80% { transform: scale(1.1); } 100% { transform: scale(1); } }
        .animate-pop-in { animation: pop-in 0.4s ease-out forwards; }
        @keyframes bounce-in { 0% { transform: translateY(-100%); opacity: 0; } 60% { transform: translateY(10%); opacity: 1; } 100% { transform: translateY(0); opacity: 1; } }
        .animate-bounce-in { animation: bounce-in 0.6s cubic-bezier(0.34, 1.56, 0.64, 1) forwards; }
        @keyframes fade-in { from { opacity: 0; } to { opacity: 1; } }
        .animate-fade-in { animation: fade-in 0.3s ease-out forwards; }

        .stroke-path { fill: none; stroke-linecap: round; stroke-linejoin: round; transition: stroke 0.3s ease; }
        .stroke-animating { animation: draw 1.2s ease-out forwards; }
        @keyframes draw { from { stroke-dashoffset: var(--path-length); } to { stroke-dashoffset: 0; } }

        @keyframes unlock-glow { 0%, 100% { box-shadow: 0 0 0 0 rgba(251,191,36,0.5), 0 2px 8px rgba(0,0,0,0.08); } 50% { box-shadow: 0 0 0 8px rgba(251,191,36,0), 0 2px 8px rgba(0,0,0,0.08); } }
        .animate-unlock-glow { animation: unlock-glow 1.6s ease-in-out infinite; }
        @keyframes slot-pop { 0% { transform: scale(0) rotate(-15deg); opacity: 0; } 65% { transform: scale(1.18) rotate(4deg); opacity: 1; } 100% { transform: scale(1) rotate(0deg); opacity: 1; } }
        .animate-slot-pop { animation: slot-pop 0.38s cubic-bezier(0.34,1.56,0.64,1) forwards; }
        @keyframes celebrate-in { 0% { opacity: 0; transform: scale(0.85); } 100% { opacity: 1; transform: scale(1); } }
        .animate-celebrate-in { animation: celebrate-in 0.4s cubic-bezier(0.34,1.56,0.64,1) forwards; }
        
        @keyframes bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-25%); } }
        .animate-bounce { animation: bounce 1s infinite; }
    </style>

            const v = window.speechSynthesis.getVoices();

        };
        if (window.speechSynthesis) {
            loadVoices();
            window.speechSynthesis.onvoiceschanged = loadVoices;
        }
        const getVoices = () => {
            if (_cachedVoices.length === 0) loadVoices();
            return _cachedVoices;
        };

        const speak = (text, { rate = 0.85, pitch = 1.1 } = {}, voiceNameOverride) => {
            if (!window.speechSynthesis) return;
            window.speechSynthesis.cancel();
            const utter = new SpeechSynthesisUtterance(text);
            utter.lang = 'ja-JP';
            utter.rate = rate;
            utter.pitch = pitch;
            if (voiceNameOverride !== undefined) {
                const v = getVoices().find(v => v.name === voiceNameOverride);
                if (v) utter.voice = v;
            }
            window.speechSynthesis.speak(utter);
        };

        const speakWithSettings = (text, settings, opts = {}) => {
            if (!window.speechSynthesis) return;
            window.speechSynthesis.cancel();
            const utter = new SpeechSynthesisUtterance(text);
            utter.lang = 'ja-JP';
            utter.rate = opts.rate || 0.85;
            utter.pitch = opts.pitch || 1.1;
            if (settings.voiceName) {
                const v = getVoices().find(v => v.name === settings.voiceName);
                if (v) utter.voice = v;
            }
            window.speechSynthesis.speak(utter);
        };

        const playSharan = () => {
            try {
                const ac = getAudioContext();
                const notes = [1800, 2400, 3000, 3800, 2800, 3500];
                notes.forEach((freq, i) => {
                    const o = ac.createOscillator();
                    const g = ac.createGain();
                    o.connect(g); g.connect(ac.destination);
                    o.type = 'triangle';
                    const t = ac.currentTime + i * 0.055;
                    o.frequency.setValueAtTime(freq * 0.85, t);
                    o.frequency.exponentialRampToValueAtTime(freq * 1.1, t + 0.06);
                    g.gain.setValueAtTime(0, t);
                    g.gain.linearRampToValueAtTime(0.15, t + 0.02);
                    g.gain.exponentialRampToValueAtTime(0.001, t + 0.22);
                    o.start(t); o.stop(t + 0.25);
                });
            } catch(e) {}
        };

        const SvgStroke = ({ strokes, strokeWidth = 5, color = "black" }) => {
            if (!strokes || strokes.length === 0) return null;
            return (
                <svg viewBox="0 0 200 200" className="w-full h-full pointer-events-none">
                    {strokes.map((stroke, i) => {
                        if (!stroke || stroke.length === 0) return null;
                        const d = `M ${stroke[0].x} ${stroke[0].y} ` + stroke.slice(1).map(p => `L ${p.x} ${p.y}`).join(' ');
                        return <path key={i} d={d} fill="none" stroke={color} strokeWidth={strokeWidth} strokeLinecap="round" strokeLinejoin="round" />;
                    })}
                </svg>
            );
        };

            bestShots: '[userId+char], userId',

        const isTargetChar = (char) => /[\u3040-\u309F\u4e00-\u9faf]/.test(char);

        const fetchKanaVGPaths = async (char) => {
            if (typeof KANJIVG_CACHE !== 'undefined' && KANJIVG_CACHE[char]) {
                return KANJIVG_CACHE[char];
            }
            const unicode = char.charCodeAt(0).toString(16).padStart(5, '0');
            const url = `https://cdn.jsdelivr.net/gh/KanjiVG/kanjivg@master/kanji/${unicode}.svg`;
            try {
                const res = await fetch(url);
                if (!res.ok) throw new Error('Fetch error');
                const text = await res.text();
                const parser = new DOMParser();
                const doc = parser.parseFromString(text, 'image/svg+xml');
                
                const pathsGroup = doc.querySelector('g[id^="kvg:StrokePaths"]');
                if (!pathsGroup) return null;

                const rootKanjiGroup = pathsGroup.firstElementChild;
                if (!rootKanjiGroup) return null;

                const result = [];
                const paths = pathsGroup.querySelectorAll('path');
                const groupMap = new Map();
                let groupIndex = 0;

                paths.forEach(p => {
                    let targetNode = p;
                    while (targetNode && targetNode.parentElement !== rootKanjiGroup) {
                        targetNode = targetNode.parentElement;
                    }
                    if (!groupMap.has(targetNode)) {
                        groupMap.set(targetNode, groupIndex++);
                    }
                    result.push({ d: p.getAttribute('d'), groupId: groupMap.get(targetNode) });
                });
                return result;
            } catch (error) { return null; }
        };

        const KanaPath = ({ d, status, strokeWidth = "5", drawnColor = "#1f2937" }) => {
            const pathRef = useRef(null);
            const [length, setLength] = useState(200); 

            useEffect(() => {
                if (pathRef.current) {
                    const actualLength = pathRef.current.getTotalLength();
                    if (actualLength > 0) setLength(actualLength);
                }
            }, [d]);

            const dynamicStyle = { '--path-length': length, strokeDasharray: length };
            if (status !== 'animating') dynamicStyle.strokeDashoffset = status === 'drawn' ? 0 : length;
            
            let strokeColor = 'transparent';
            if (status === 'drawn') strokeColor = drawnColor;
            if (status === 'animating') strokeColor = '#f97316'; 

            return <path ref={pathRef} d={d} className={`stroke-path ${status === 'animating' ? 'stroke-animating' : ''}`} stroke={strokeColor} strokeWidth={strokeWidth} style={dynamicStyle} />;
        };

        const AnimatedKana = ({ paths, strokes, multiColor, onComplete, isKogaki, trickyStroke, playRef, onStatusChange }) => {
            const [status, setStatus] = useState('idle');
            const [currentStroke, setCurrentStroke] = useState(-1);
            
            const play = () => { 
                if (status !== 'playing') { setStatus('playing'); setCurrentStroke(0); } 
            };
            
            // playRefに常に最新のplay関数を格納（親から呼び出せるように）
            useEffect(() => { if (playRef) playRef.current = play; });
            // statusが変わるたびに親へ通知
            useEffect(() => { if (onStatusChange) onStatusChange(status); }, [status]);
            
            useEffect(() => { setStatus('idle'); setCurrentStroke(-1); }, [paths]);
            
            useEffect(() => {
                if (status === 'playing') {
                    if (currentStroke < paths.length) {
                        const timer = setTimeout(() => setCurrentStroke(prev => prev + 1), 1300); 
                        return () => clearTimeout(timer);
                    } else {
                        setStatus('done');
                        if (onComplete) onComplete();
                        const resetTimer = setTimeout(() => { setStatus('idle'); setCurrentStroke(-1); }, 2000); 
                        return () => clearTimeout(resetTimer);
                    }
                }
            }, [status, currentStroke, paths.length, onComplete]);

            // ボタンは親(PracticeStudio)のモードボタン行に移動。ここはボックスのみ返す。
            return (
                <div className="w-full h-full bg-white rounded-xl shadow-md border-4 border-orange-200 flex items-center justify-center relative p-0">
                    <div className="absolute inset-0 pointer-events-none opacity-50 z-0">
                        <div className="absolute top-1/2 w-full border-t-2 border-dashed border-red-300"></div>
                        <div className="absolute left-1/2 h-full border-l-2 border-dashed border-red-300"></div>
                    </div>
                    <span className="absolute top-1 left-1 text-[10px] text-red-500 bg-white px-1 rounded border border-red-200 z-20 font-bold">{strokes}かく</span>
                    
                    <div className={isKogaki ? "absolute z-10" : "absolute inset-0 z-10"} style={isKogaki ? {left:'-8%', bottom:'0%', width:'66%', height:'66%'} : {}}>
                        <svg viewBox="4 4 101 101" className="w-full h-full">
                            {paths.map((p, i) => (
                                <path key={`guide-${i}`} d={p.d} className="stroke-path" strokeWidth="6" 
                                      stroke={multiColor ? PART_COLORS[p.groupId % PART_COLORS.length] : '#e5e7eb'} 
                                      opacity={multiColor ? "0.3" : "1"} />
                            ))}
                            {paths.map((p, i) => {
                                let pathStatus = 'undrawn';
                                if (status === 'idle' || status === 'done') pathStatus = 'drawn';
                                else if (status === 'playing') {
                                    if (i < currentStroke) pathStatus = 'drawn';
                                    else if (i === currentStroke) pathStatus = 'animating';
                                }
                                const drawnColor = multiColor ? PART_COLORS[p.groupId % PART_COLORS.length] : '#1f2937';
                                return <KanaPath key={`stroke-${i}`} d={p.d} status={pathStatus} strokeWidth="5" drawnColor={drawnColor} />;
                            })}
                        </svg>
                    </div>
                </div>
            );
        };

        const AdminScreen = ({ onBack, settings, saveSettings }) => {
            const fileInputRef = useRef(null);
            const [jaVoices, setJaVoices] = useState([]);

            useEffect(() => {
                const load = () => {
                    const all = window.speechSynthesis.getVoices();
                    const ja = all.filter(v => v.lang.startsWith('ja'));
                    setJaVoices(ja);
                };
                load();
                window.speechSynthesis.onvoiceschanged = load;
                return () => { window.speechSynthesis.onvoiceschanged = null; };
            }, []);

            const IPAD_ONLY_VOICES = ['Kyoko', 'O-ren', 'Hattori', 'Otoya'];

            const handleExport = async () => {
                try {
                    const data = {
                        version: "1.0",
                        exportDate: new Date().toISOString(),
                        users: await db.users.toArray(),
                        settings: await db.settings.toArray(),
                        practices: await db.practices.toArray(),
                        bestShots: await db.bestShots.toArray(),
                        readWords: await db.readWords.toArray()
                    };
                    const blob = new Blob([JSON.stringify(data)], { type: 'application/json' });
                    const url = URL.createObjectURL(blob);
                    const a = document.createElement('a');
                    a.href = url;
                    const dateStr = new Date().toLocaleDateString('ja-JP').replace(/\//g, '');
                    a.download = `hiragana_backup_${dateStr}.json`;
                    document.body.appendChild(a);
                    a.click();
                    document.body.removeChild(a);
                    URL.revokeObjectURL(url);
                    alert("バックアップデータをほぞんしました！");
                } catch (e) {
                    console.error("エクスポートに失敗しました:", e);
                    alert("エラーがおきました。");
                }
            };

            const handleImport = async (e) => {
                const file = e.target.files[0];
                if (!file) return;

                const isMigration = window.confirm(
                    "【かくにん】\nちがうGoogleアカウントへ データをうつしますか？\n" +
                    "（「はい」をえらぶと、新しいアカウント用にIDを書き換えて移植します）"
                );

                if (!window.confirm("データを読み込みます。いまのデータはすべて消えて上書きされますが、いいですか？\n（もとに戻すことはできません）")) {
                    e.target.value = ''; 
                    return;
                }

                const reader = new FileReader();
                reader.onload = async (event) => {
                    try {
                        const data = JSON.parse(event.target.result);
                        if (!data.version || !data.users || !data.settings) {
                            alert("正しいファイルを選んでね。");
                            return; 
                        }

                        if (isMigration) {
                            if (data.users) {
                                data.users = data.users.map(u => ({
                                    ...u,
                                    profileId: crypto.randomUUID()
                                }));
                            }
                            const resetSync = (arr) => arr ? arr.map(item => ({ ...item, synced: false })) : [];
                            if (data.bestShots) data.bestShots = resetSync(data.bestShots);
                            if (data.readWords) data.readWords = resetSync(data.readWords);
                        }

                        await db.transaction('rw', db.users, db.settings, db.practices, db.bestShots, db.readWords, async () => {
                            if (data.users) { await db.users.clear(); await db.users.bulkPut(data.users); }
                            if (data.settings) { await db.settings.clear(); await db.settings.bulkPut(data.settings); }
                            if (data.practices) { await db.practices.clear(); await db.practices.bulkPut(data.practices); }
                            if (data.bestShots) { await db.bestShots.clear(); await db.bestShots.bulkPut(data.bestShots); }
                            if (data.readWords) { await db.readWords.clear(); await db.readWords.bulkPut(data.readWords); }
                        });

                        alert(isMigration ? "データの移植がおわりました！アプリを再起動します。" : "データのふくげんがおわりました！アプリを再起動します。");
                        window.location.reload();
                    } catch (err) {
                        console.error("インポートに失敗しました:", err);
                        alert("データがこわれているか、読み込めませんでした。");
                    }
                };
                reader.readAsText(file);
            };

            return (
                <div className="p-6 max-w-5xl mx-auto bg-white min-h-screen">
                    <div className="flex justify-between items-center mb-6 border-b pb-4">
                        <button onClick={onBack} className="text-stone-500 flex items-center gap-1 bg-stone-100 px-4 py-2 rounded-full font-bold hover:bg-stone-200 transition-colors">
                            ↩️ もどる
                        </button>
                        <h2 className="text-2xl font-bold text-stone-800 flex items-center gap-2">
                            <SettingsIcon className="w-6 h-6"/> 管理・設定画面
                        </h2>
                        <div className="w-24"></div>
                    </div>
                    
                    <div className="grid grid-cols-1 md:grid-cols-2 gap-6 pb-4">
                        <div className="space-y-6">

                            <div className="bg-green-50 p-4 rounded-xl border border-green-200 shadow-sm">
                                <h3 className="font-bold text-lg mb-1 text-green-800 flex items-center gap-2">🔊 おしゃべりの声</h3>
                                <p className="text-xs text-green-600 mb-3">文字やことばを読むときの声をえらべます。</p>
                                {jaVoices.length === 0 ? (
                                    <p className="text-xs text-stone-400 font-bold">このデバイスでは音声が見つかりませんでした。</p>
                                ) : (
                                    <div className="flex flex-col gap-2">
                                        <button
                                            onClick={() => { saveSettings({...settings, voiceName: ''}); speak('こんにちは'); }}
                                            className={`px-4 py-2.5 rounded-lg font-bold border-2 transition-all text-left text-sm ${!settings.voiceName ? 'border-green-500 bg-green-400 text-white shadow-md' : 'border-stone-300 bg-white text-stone-600'}`}
                                        >
                                            🤖 デフォルト（じどうせんたく）
                                        </button>
                                        {jaVoices.map(v => {
                                            const isIpadOnly = IPAD_ONLY_VOICES.some(n => v.name.includes(n));
                                            const isSelected = settings.voiceName === v.name;
                                            return (
                                                <button key={v.name}
                                                    onClick={() => { saveSettings({...settings, voiceName: v.name}); speak('こんにちは', {}, v.name); }}
                                                    className={`px-4 py-2.5 rounded-lg font-bold border-2 transition-all text-left text-sm flex items-center justify-between gap-2 ${isSelected ? 'border-green-500 bg-green-400 text-white shadow-md' : 'border-stone-300 bg-white text-stone-600'}`}
                                                >
                                                    <span>🗣 {v.name}</span>
                                                    <span className="flex gap-1 flex-wrap justify-end">
                                                        {isIpadOnly && <span className={`text-[10px] px-1.5 py-0.5 rounded-full font-bold ${isSelected ? 'bg-white/30 text-white' : 'bg-blue-100 text-blue-600'}`}>iPad専用</span>}
                                                        {!v.localService && <span className={`text-[10px] px-1.5 py-0.5 rounded-full font-bold ${isSelected ? 'bg-white/30 text-white' : 'bg-stone-100 text-stone-500'}`}>オンライン</span>}
                                                    </span>
                                                </button>
                                            );
                                        })}
                                    </div>
                                )}
                            </div>

                            <div className="bg-stone-50 p-4 rounded-xl border border-stone-200 shadow-sm">
                                <h3 className="font-bold text-lg mb-3 flex items-center gap-2"><Hand className="w-5 h-5 text-stone-500"/> ききうで（利き手）</h3>
                                <div className="flex gap-2">
                                    <button onClick={() => saveSettings({...settings, hand: 'right'})} className={`px-6 py-2 rounded-lg font-bold border-2 transition-all ${settings.hand === 'right' || !settings.hand ? 'border-sky-500 bg-sky-400 text-white shadow-md' : 'border-stone-300 bg-white text-stone-600'}`}>みぎきき</button>
                                    <button onClick={() => saveSettings({...settings, hand: 'left'})} className={`px-6 py-2 rounded-lg font-bold border-2 transition-all ${settings.hand === 'left' ? 'border-sky-500 bg-sky-400 text-white shadow-md' : 'border-stone-300 bg-white text-stone-600'}`}>ひだりきき</button>
                                </div>
                            </div>

                            <div className="bg-sky-50 p-4 rounded-xl border border-sky-200 shadow-sm">
                                <h3 className="font-bold text-lg mb-1 text-sky-800 flex items-center gap-1"><Sparkles className="w-4 h-4"/> はじめての「書き順かくにん」</h3>
                                <p className="text-xs text-sky-600 mb-3">はじめて書く文字は、おてほんのアニメーションを見るまでキャンバスに書けないようにします。</p>
                                <div className="flex gap-2">
                                    <button onClick={() => saveSettings({...settings, requireGuide: true})} className={`px-4 py-2 rounded-lg font-bold border-2 transition-all ${settings.requireGuide ? 'border-sky-500 bg-sky-400 text-white shadow-md' : 'border-stone-300 bg-white text-stone-600'}`}>ON</button>
                                    <button onClick={() => saveSettings({...settings, requireGuide: false})} className={`px-4 py-2 rounded-lg font-bold border-2 transition-all ${!settings.requireGuide ? 'border-stone-500 bg-stone-500 text-white shadow-md' : 'border-stone-300 bg-white text-stone-600'}`}>OFF</button>
                                </div>
                            </div>

                            <div className="bg-amber-50 p-4 rounded-xl border border-amber-200 shadow-sm">
                                <h3 className="font-bold text-lg mb-1 text-amber-800 flex items-center gap-1"><Sparkles className="w-4 h-4"/> NEW✨マークの表示期間</h3>
                                <p className="text-xs text-amber-600 mb-3">「さいきんかけたもじ」セクションにも同じ期間が使われます。</p>
                                <div className="flex gap-2 flex-wrap">
                                    {DURATION_OPTIONS.map(opt => (
                                        <button key={opt.val} onClick={() => saveSettings({...settings, newDuration: opt.val})} className={`px-4 py-2 rounded-lg font-bold border-2 transition-all ${settings.newDuration === opt.val ? 'border-amber-500 bg-amber-400 text-white shadow-md' : 'border-stone-300 bg-white text-stone-600'}`}>{opt.label}</button>
                                    ))}
                                </div>
                            </div>

                            <div className="bg-sky-50 p-4 rounded-xl border border-sky-200 shadow-sm">
                                <h3 className="font-bold text-lg mb-1 text-sky-800 flex items-center gap-1">✏️ なぞりがきのガイド線の太さ</h3>
                                <p className="text-xs text-sky-600 mb-3">「なぞり」モードでうっすら見えるガイドの線の太さを選べます。</p>
                                <div className="flex gap-2 flex-wrap items-end">
                                    {[
                                        { val: 3,  label: 'ほそい', preview: 3 },
                                        { val: 6,  label: 'ふつう', preview: 6 },
                                        { val: 10, label: 'ふとい', preview: 10 },
                                    ].map(opt => {
                                        const isActive = (settings.traceWidth ?? 6) === opt.val;
                                        return (
                                            <button key={opt.val}
                                                onClick={() => saveSettings({...settings, traceWidth: opt.val})}
                                                className={`flex flex-col items-center gap-2 px-3 py-2 rounded-xl border-2 transition-all ${isActive ? 'border-sky-500 bg-sky-400 text-white shadow-md' : 'border-stone-300 bg-white text-stone-600 hover:border-sky-300'}`}
                                            >
                                                <svg width="48" height="20" viewBox="0 0 48 20">
                                                    <path d="M4 10 Q12 2, 24 10 Q36 18, 44 10" fill="none"
                                                        stroke={isActive ? 'white' : '#38bdf8'}
                                                        strokeWidth={opt.preview}
                                                        strokeLinecap="round"
                                                        opacity="0.8"
                                                    />
                                                </svg>
                                                <span className="text-xs font-bold">{opt.label}</span>
                                            </button>
                                        );
                                    })}
                                </div>
                            </div>

                            {/* キャンバスサイズ設定 */}
                            <div className="bg-orange-50 p-4 rounded-xl border border-orange-200 shadow-sm">
                                <h3 className="font-bold text-lg mb-1 text-orange-800 flex items-center gap-1">📐 れんしゅうキャンバスのおおきさ</h3>
                                <p className="text-xs text-orange-600 mb-3">かく場所のおおきさをえらべます。「ふつう」がおすすめです。</p>
                                <div className="flex gap-2">
                                    {[
                                        { val: 'small',  label: 'ちいさい', canvasW: 18, refW: 13 },
                                        { val: 'medium', label: 'ふつう',   canvasW: 26, refW: 18 },
                                        { val: 'large',  label: 'おおきい', canvasW: 34, refW: 24 },
                                    ].map(opt => {
                                        const isActive = (settings.canvasSize ?? 'medium') === opt.val;
                                        return (
                                            <button key={opt.val}
                                                onClick={() => saveSettings({...settings, canvasSize: opt.val})}
                                                className={`flex flex-col items-center gap-2 px-3 py-3 rounded-xl border-2 flex-1 transition-all ${isActive ? 'border-orange-500 bg-orange-400 text-white shadow-md' : 'border-stone-300 bg-white text-stone-600 hover:border-orange-300'}`}
                                            >
                                                <div className="flex items-end gap-1.5 h-10 justify-center">
                                                    <div className="rounded border-2 border-current opacity-60" style={{width:`${opt.refW}px`, height:`${opt.refW}px`}}></div>
                                                    <div className="rounded border-2 border-current" style={{width:`${opt.canvasW}px`, height:`${opt.canvasW}px`}}></div>
                                                </div>
                                                <span className="text-xs font-bold">{opt.label}</span>
                                            </button>
                                        );
                                    })}
                                </div>
                            </div>

                            {/* 4段階の目標設定 */}
                            <div className="bg-indigo-50 p-4 rounded-xl border border-indigo-200 shadow-sm">
                                <h3 className="font-bold text-lg mb-1 text-indigo-800 flex items-center gap-2">🎯 れんしゅうの ながれ</h3>
                                <p className="text-xs text-indigo-600 mb-3">各モードの目標回数を設定します。すべてのモードが完了すると、なかから1枚えらべます。0回にするとそのモードをスキップします。</p>
                                {[
                                    { key: 'traceAllTarget', label: 'なぞり',   emoji: '✏️', activeStyle: { borderColor: '#0ea5e9', backgroundColor: '#e0f2fe', color: '#0369a1' }, defaultVal: 1 },
                                    { key: 'tenTarget',      label: 'てん',     emoji: '⚫️', activeStyle: { borderColor: '#f59e0b', backgroundColor: '#fef3c7', color: '#b45309' }, defaultVal: 1 },
                                    { key: 'blankTarget',    label: 'おてほん', emoji: '👁️', activeStyle: { borderColor: '#22c55e', backgroundColor: '#dcfce7', color: '#15803d' }, defaultVal: 1 },
                                    { key: 'testTarget',     label: 'みないで', emoji: '🙈', activeStyle: { borderColor: '#a855f7', backgroundColor: '#f3e8ff', color: '#7e22ce' }, defaultVal: 1 },
                                ].map(({ key, label, emoji, activeStyle, defaultVal }) => (
                                    <div key={key} className="flex items-center gap-3 mb-2">
                                        <span className="w-20 text-sm font-bold text-stone-600">{emoji} {label}</span>
                                        <div className="flex gap-1.5">
                                            {[0, 1, 2, 3, 5].map(num => {
                                                const isActive = (settings[key] ?? defaultVal) === num;
                                                return (
                                                    <button key={num}
                                                        onClick={() => saveSettings({...settings, [key]: num})}
                                                        className="w-9 h-9 rounded-lg font-bold border-2 transition-all text-sm"
                                                        style={isActive ? activeStyle : { borderColor: '#d6d3d1', backgroundColor: 'white', color: '#78716c' }}
                                                    >
                                                        {num === 0 ? 'なし' : `${num}`}
                                                    </button>
                                                );
                                            })}
                                        </div>
                                    </div>
                                ))}
                            </div>
                        </div>

                        <div className="space-y-6">
                            <div className="bg-purple-50 p-4 rounded-xl border border-purple-200 shadow-sm">
                                <h3 className="font-bold text-lg mb-1 text-purple-800 flex items-center gap-1"><Sparkles className="w-4 h-4"/> ギャラリーにかざる「合格ライン」</h3>
                                <p className="text-xs text-purple-600 mb-3">どの書き方で仕上げた時に、一覧（コレクション）へ追加するかを決めます。</p>
                                <div className="flex flex-col gap-2">
                                    <button onClick={() => saveSettings({...settings, completionLevel: 1})} className={`px-4 py-3 rounded-lg font-bold border-2 transition-all text-left ${settings.completionLevel === 1 || !settings.completionLevel ? 'border-purple-500 bg-purple-400 text-white shadow-md' : 'border-stone-300 bg-white text-stone-600'}`}>
                                        レベル1： なぞり・てん・おてほん・みないで（どれでもOK）
                                    </button>
                                    <button onClick={() => saveSettings({...settings, completionLevel: 2})} className={`px-4 py-3 rounded-lg font-bold border-2 transition-all text-left ${settings.completionLevel === 2 ? 'border-purple-500 bg-purple-400 text-white shadow-md' : 'border-stone-300 bg-white text-stone-600'}`}>
                                        レベル2： おてほん・みないで（自力で書けたらOK）
                                    </button>
                                    <button onClick={() => saveSettings({...settings, completionLevel: 3})} className={`px-4 py-3 rounded-lg font-bold border-2 transition-all text-left ${settings.completionLevel === 3 ? 'border-purple-500 bg-purple-400 text-white shadow-md' : 'border-stone-300 bg-white text-stone-600'}`}>
                                        レベル3： みないで（見本なしで書けたらOK）
                                    </button>
                                </div>
                            </div>

                            <div className="bg-stone-50 p-4 rounded-xl border border-stone-200">
                                <h3 className="font-bold text-lg mb-3">各モードの枠の色設定</h3>
                                <div className="space-y-6">
                                    <div>
                                        <label className="block text-sm font-bold text-stone-700 mb-2 flex items-center gap-2"><div className={`w-3 h-3 rounded-full ${COLOR_OPTIONS.find(c=>c.id === settings.traceColor)?.bg || 'bg-sky-400'}`}></div> 「なぞり」「てん」モードのいろ</label>
                                        <div className="grid grid-cols-5 gap-2">
                                            {COLOR_OPTIONS.map(color => (
                                                <button key={`trace-${color.id}`} onClick={() => saveSettings({...settings, traceColor: color.id})} className={`w-full h-10 rounded-lg border-4 transition-all ${color.bg} ${settings.traceColor === color.id ? 'border-stone-400 scale-105 shadow-md' : 'border-transparent hover:border-stone-300'}`}></button>
                                            ))}
                                        </div>
                                    </div>
                                    <div>
                                        <label className="block text-sm font-bold text-stone-700 mb-2 flex items-center gap-2"><div className={`w-3 h-3 rounded-full ${COLOR_OPTIONS.find(c=>c.id === settings.blankColor)?.bg || 'bg-green-400'}`}></div> 「おてほん」モードのいろ</label>
                                        <div className="grid grid-cols-5 gap-2">
                                            {COLOR_OPTIONS.map(color => (
                                                <button key={`blank-${color.id}`} onClick={() => saveSettings({...settings, blankColor: color.id})} className={`w-full h-10 rounded-lg border-4 transition-all ${color.bg} ${settings.blankColor === color.id ? 'border-stone-400 scale-105 shadow-md' : 'border-transparent hover:border-stone-300'}`}></button>
                                            ))}
                                        </div>
                                    </div>
                                    <div>
                                        <label className="block text-sm font-bold text-stone-700 mb-2 flex items-center gap-2"><div className={`w-3 h-3 rounded-full ${COLOR_OPTIONS.find(c=>c.id === settings.testColor)?.bg || 'bg-purple-400'}`}></div> 「みないで」モードのいろ</label>
                                        <div className="grid grid-cols-5 gap-2">
                                            {COLOR_OPTIONS.map(color => (
                                                <button key={`test-${color.id}`} onClick={() => saveSettings({...settings, testColor: color.id})} className={`w-full h-10 rounded-lg border-4 transition-all ${color.bg} ${settings.testColor === color.id ? 'border-stone-400 scale-105 shadow-md' : 'border-transparent hover:border-stone-300'}`}></button>
                                            ))}
                                        </div>
                                    </div>
                                </div>
                            </div>

                            <div className="bg-red-50 p-4 rounded-xl border border-red-200 shadow-sm">
                                <h3 className="font-bold text-lg mb-1 text-red-800 flex items-center gap-1"><Lock className="w-4 h-4"/> データのおまもり</h3>
                                <div className="flex gap-4">
                                    <button onClick={handleExport} className="flex-1 py-3 rounded-lg font-bold bg-white border-2 border-red-300 text-red-700 hover:bg-red-100 transition-all shadow-sm">
                                        ほぞんする<br/><span className="text-[10px] font-normal">（書き出し）</span>
                                    </button>
                                    <button onClick={() => fileInputRef.current.click()} className="flex-1 py-3 rounded-lg font-bold bg-red-400 border-2 border-red-500 text-white hover:bg-red-500 transition-all shadow-sm">
                                        ふくげんする<br/><span className="text-[10px] font-normal">（読み込み）</span>
                                    </button>
                                    <input type="file" accept=".json" ref={fileInputRef} onChange={handleImport} className="hidden" />
                                </div>
                            </div>

                            <div className="bg-sky-50 p-4 rounded-xl border border-sky-200 shadow-sm">
                                <h3 className="font-bold text-lg mb-2 text-sky-800 flex items-center gap-2">📱 べつの端末でつかうとき</h3>
                                <div className="space-y-3 text-sm text-sky-700">
                                    <div className="flex gap-2 items-start">
                                        <span className="shrink-0 font-bold bg-sky-400 text-white rounded-full w-5 h-5 flex items-center justify-center text-xs">1</span>
                                        <p>この端末の「だれがあそぶ？」画面で ✏️ ボタンを押して、<strong>🔑 IDをコピー</strong>してね</p>
                                    </div>
                                    <div className="flex gap-2 items-start">
                                        <span className="shrink-0 font-bold bg-sky-400 text-white rounded-full w-5 h-5 flex items-center justify-center text-xs">2</span>
                                        <p>べつの端末でアプリをひらいて、<strong>「あたらしく つくる」</strong>でプロフィールを作るよ</p>
                                    </div>
                                    <div className="flex gap-2 items-start">
                                        <span className="shrink-0 font-bold bg-sky-400 text-white rounded-full w-5 h-5 flex items-center justify-center text-xs">3</span>
                                        <p>なまえやアイコンを入れて、いちばん下の<strong>「IDをもっているひとはここに入れてね」</strong>にコピーしたIDをはり付けて「ほぞんする」！</p>
                                    </div>
                                    <div className="p-3 bg-white rounded-lg border border-sky-200 text-xs text-stone-500 leading-relaxed">
                                        ✅ おなじIDでログインすると、クラウドに保存された練習データが自動で読み込まれるよ。<br/>
                                        ⚠️ べつの端末にすでにデータがある場合、新しいほうで上書きされることがあるよ。
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        const PracticeStudio = ({ currentUser, targetKanji, settings, onBack, onSaveBest, onSaveComplete, onOpenAdmin, onToggleSound }) => {
            const [isGuideWatched, setIsGuideWatched] = useState(false);
            const hand = settings.hand || 'right'; 
            const isKogaki = ['ゃ','ゅ','ょ','っ'].includes(targetKanji.char);

            // キャンバスサイズ設定（small/medium/large）
            // 'large' が現在の最大サイズ、'medium' がデフォルト
            const canvasSize = settings.canvasSize ?? 'medium';
            const canvasSizeClass = canvasSize === 'large'  ? 'w-56 md:w-80'
                                  : canvasSize === 'small'  ? 'w-36 md:w-52'
                                  : /* medium */              'w-44 md:w-64';
            const refSizeClass    = canvasSize === 'large'  ? 'w-40 md:w-56'
                                  : canvasSize === 'small'  ? 'w-24 md:w-36'
                                  : /* medium */              'w-32 md:w-44';
            
            // 「なし」設定をスキップして最初のアクティブなモードを初期値にする
            const [practiceMode, setPracticeMode] = useState(() => {
                const tAT = settings.traceAllTarget ?? 1;
                const teT = settings.tenTarget      ?? 1;
                const bT  = settings.blankTarget    ?? 1;
                const tS  = settings.testTarget     ?? 1;
                if (tAT > 0) return 'traceAll';
                if (teT > 0) return 'ten';
                if (bT  > 0) return 'blank';
                if (tS  > 0) return 'test';
                return 'traceAll'; // すべて0のときのフォールバック
            });
            const isTestMode = practiceMode === 'test';
            
            const [strokeWarning, setStrokeWarning] = useState(false); 
            const [practices, setPractices] = useState([]);

            // 4段階対応のログ集計
            const sessionLogs = useMemo(() => ({
                traceAll: practices.filter(p => p.type === 'traceAll' || p.type === 'trace').length,
                ten:  practices.filter(p => p.type === 'ten' || p.type === 'hint').length,
                blank: practices.filter(p => p.type === 'blank').length,
                test:  practices.filter(p => p.type === 'test').length,
            }), [practices]);
            
            const [isAnimating, setIsAnimating] = useState(false);
            const [lastWrittenImage, setLastWrittenImage] = useState(null);
            const [hasDrawn, setHasDrawn] = useState(false);
            const [svgPaths, setSvgPaths] = useState(null);
            const [isLoadingPaths, setIsLoadingPaths] = useState(true);
            const [savingId, setSavingId] = useState(null); 
            const [isFlowDone, setIsFlowDone] = useState(false);
            const isFlowDoneRef = useRef(false);
            
            const isCanvasLocked = settings.requireGuide && practices.length === 0 && !isGuideWatched;

            const [flyingCard, setFlyingCard] = useState({ active: false, image: null, startX: 0, startY: 0, tx: 0, ty: 0, flying: false });

            const allStrokesRef = useRef([]); 
            const currentStrokeRef = useRef([]);
            const canvasRef = useRef(null);
            const contextRef = useRef(null);
            const isDrawingRef = useRef(false);
            const canvasContainerRef = useRef(null);
            const practicesStripRef = useRef(null);
            // 再生ボタン用: AnimatedKanaのplay関数をここから呼ぶ
            const kanaPlayRef = useRef(null);
            const [kanaStatus, setKanaStatus] = useState('idle');
            
            const practiceModeRef = useRef(practiceMode);
            const traceAllTargetRef = useRef(0);
            const tenTargetRef = useRef(0);
            const blankTargetRef = useRef(0);
            const testTargetRef  = useRef(0);

            // 4段階目標回数の取得
            const traceAllTarget = settings.traceAllTarget ?? 1;
            const tenTarget = settings.tenTarget ?? 1;
            const blankTarget = settings.blankTarget ?? 1;
            const testTarget  = settings.testTarget  ?? 1;

            useEffect(() => { practiceModeRef.current = practiceMode; }, [practiceMode]);
            useEffect(() => {
                traceAllTargetRef.current = traceAllTarget;
                tenTargetRef.current = tenTarget;
                blankTargetRef.current = blankTarget;
                testTargetRef.current  = testTarget;
            }, [traceAllTarget, tenTarget, blankTarget, testTarget]);

            // isGoalReachedロジック更新
            const isGoalReached = 
                (traceAllTarget === 0 || sessionLogs.traceAll >= traceAllTarget) &&
                (tenTarget === 0 || sessionLogs.ten >= tenTarget) &&
                (blankTarget === 0 || sessionLogs.blank >= blankTarget) &&
                (testTarget  === 0 || sessionLogs.test  >= testTarget);

            useEffect(() => {
                const loadData = async () => {
                    let savedPractices = await db.practices.where({ userId: currentUser.id, char: targetKanji.char }).toArray();
                    if (savedPractices.length === 0) {
                        const pastBest = await db.bestShots.get({ userId: currentUser.id, char: targetKanji.char });
                        if (pastBest) savedPractices = [pastBest];
                    }
                    setPractices(savedPractices);
                };
                loadData();
            }, [targetKanji.char, currentUser.id]);

            const adjustCanvasSize = () => {
                const canvas = canvasRef.current;
                if (!canvas) return;
                const rect = canvas.getBoundingClientRect();
                const dpr = window.devicePixelRatio || 1;
                if (Math.abs(canvas.width - rect.width * dpr) > 1 || canvas.width === 0) {
                    canvas.width = rect.width * dpr;
                    canvas.height = rect.height * dpr;
                    const ctx = canvas.getContext('2d');
                    ctx.scale(dpr, dpr);
                    ctx.lineCap = 'round';
                    ctx.lineJoin = 'round';
                    ctx.strokeStyle = '#333';
                    ctx.lineWidth = 8;
                    contextRef.current = ctx;
                }
            };

            useEffect(() => {
                setTimeout(adjustCanvasSize, 150);
                const canvas = canvasRef.current;
                const prevent = (e) => e.target === canvas && e.preventDefault();
                document.body.addEventListener('touchmove', prevent, { passive: false });
                return () => document.body.removeEventListener('touchmove', prevent);
            }, [targetKanji]);

            const getPos = (e) => {
                const rect = canvasRef.current.getBoundingClientRect();
                const clientX = e.touches ? e.touches[0].clientX : e.clientX;
                const clientY = e.touches ? e.touches[0].clientY : e.clientY;
                const rawX = clientX - rect.left;
                const rawY = clientY - rect.top;
                const normX = (rawX / rect.width) * 200;
                const normY = (rawY / rect.height) * 200;
                return { rawX, rawY, normX, normY };
            };

            const start = (e) => { 
                if (isCanvasLocked) return;
                if (!practiceModeRef.current) return;
                adjustCanvasSize(); 
                const { rawX, rawY, normX, normY } = getPos(e); 
                contextRef.current.beginPath(); 
                contextRef.current.moveTo(rawX, rawY); 
                isDrawingRef.current = true; 
                if (!hasDrawn) setHasDrawn(true);
                currentStrokeRef.current = [{ x: Math.round(normX), y: Math.round(normY) }];
            };

            const move = (e) => { 
                if (!isDrawingRef.current) return; 
                const { rawX, rawY, normX, normY } = getPos(e); 
                contextRef.current.lineTo(rawX, rawY); 
                contextRef.current.stroke(); 
                const lastPoint = currentStrokeRef.current[currentStrokeRef.current.length - 1];
                if (!lastPoint || Math.hypot(lastPoint.x - normX, lastPoint.y - normY) > 2) {
                    currentStrokeRef.current.push({ x: Math.round(normX), y: Math.round(normY) });
                }
            };

            const end = () => { 
                if (!isDrawingRef.current) return;
                contextRef.current.closePath(); 
                isDrawingRef.current = false; 
                if (currentStrokeRef.current.length > 0) {
                    allStrokesRef.current.push(currentStrokeRef.current);
                    currentStrokeRef.current = [];
                }
            };

            const clear = () => { 
                contextRef.current.clearRect(0, 0, canvasRef.current.width, canvasRef.current.height); 
                setHasDrawn(false);
                allStrokesRef.current = [];
                currentStrokeRef.current = [];
            };

            useEffect(() => {
                let isMounted = true;
                setIsLoadingPaths(true);
                fetchKanaVGPaths(targetKanji.char).then(paths => {
                    if (isMounted) { setSvgPaths(paths); setIsLoadingPaths(false); }
                });
                return () => { isMounted = false; };
            }, [targetKanji.char]);

            const playDoneSound = () => {
                try {
                    const ac = getAudioContext();
                    const notes = [2400, 3200, 4100];
                    notes.forEach((freq, i) => {
                        const o = ac.createOscillator();
                        const g = ac.createGain();
                        o.connect(g); g.connect(ac.destination);
                        o.type = 'triangle';
                        const t = ac.currentTime + i * 0.07;
                        o.frequency.setValueAtTime(freq * 0.7, t);
                        o.frequency.exponentialRampToValueAtTime(freq, t + 0.03);
                        o.frequency.exponentialRampToValueAtTime(freq * 1.15, t + 0.1);
                        g.gain.setValueAtTime(0, t);
                        g.gain.linearRampToValueAtTime(0.22, t + 0.02);
                        g.gain.exponentialRampToValueAtTime(0.001, t + 0.18);
                        o.start(t); o.stop(t + 0.2);
                    });
                    const o2 = ac.createOscillator();
                    const g2 = ac.createGain();
                    o2.connect(g2); g2.connect(ac.destination);
                    o2.type = 'sine';
                    const t2 = ac.currentTime + 0.5;
                    o2.frequency.setValueAtTime(700, t2);
                    o2.frequency.exponentialRampToValueAtTime(450, t2 + 0.15);
                    g2.gain.setValueAtTime(0.35, t2);
                    g2.gain.exponentialRampToValueAtTime(0.001, t2 + 0.2);
                    o2.start(t2); o2.stop(t2 + 0.22);
                } catch(e) {}
            };

            const handleFinish = async (skipCheck = false) => {
                if(isAnimating || !hasDrawn) return;
                // 全モード完了後（practiceMode=null）は保存しない
                if (!practiceMode) return;
                
                if (!skipCheck) {
                    const actualStrokes = allStrokesRef.current.length;
                    const requiredStrokes = targetKanji.strokes - 1;
                    if (actualStrokes < requiredStrokes) {
                        setStrokeWarning(true);
                        return;
                    }
                }
                
                const strokes = [...allStrokesRef.current]; 
                const dataUrl = canvasRef.current.toDataURL('image/png');
                const currentLogs = { ...sessionLogs, [practiceMode]: sessionLogs[practiceMode] + 1 };
                
                setIsAnimating(true);

                // ▼ hintData の生成処理を完全に削除しました
                const newPractice = {
                    userId: currentUser.id,
                    char: targetKanji.char,
                    image: dataUrl,
                    strokes: strokes, 
                    type: practiceMode, 
                    logs: currentLogs,  
                    timestamp: Date.now()
                };

                const id = await db.practices.add(newPractice);
                setStrokeWarning(false);
                setLastWrittenImage(dataUrl);

                const canvasRect = canvasRef.current.getBoundingClientRect();
                const stripRect = practicesStripRef.current ? practicesStripRef.current.getBoundingClientRect() : null;
                const targetCardW = 80;
                const scale = targetCardW / canvasRect.width;
                const srcCX = canvasRect.left + canvasRect.width / 2;
                const srcCY = canvasRect.top + canvasRect.height / 2;
                let destCX = srcCX, destCY = srcCY - 140;
                if (stripRect) {
                    destCX = stripRect.left + 48 + targetCardW / 2;
                    destCY = stripRect.top + stripRect.height / 2;
                }
                const tx = destCX - srcCX;
                const ty = destCY - srcCY;

                if (settings.soundEnabled !== false) playDoneSound();
                setFlyingCard({ active: true, image: dataUrl, startX: canvasRect.left, startY: canvasRect.top, w: canvasRect.width, h: canvasRect.height, tx, ty, scale, flying: false });
                
                requestAnimationFrame(() => requestAnimationFrame(() => {
                    setFlyingCard(prev => ({ ...prev, flying: true }));
                }));

                setTimeout(() => {
                    setFlyingCard({ active: false, image: null, startX: 0, startY: 0, w: 60, h: 60, tx: 0, ty: 0, scale: 1, flying: false });
                    setPractices(prev => [{ ...newPractice, id }, ...prev]);
                    setIsAnimating(false);
                    setHasDrawn(false); 
                    contextRef.current.clearRect(0, 0, canvasRef.current.width, canvasRef.current.height); 
                    allStrokesRef.current = [];
                    currentStrokeRef.current = [];
                    
                    // 自動モード遷移ロジックの更新
                    const mode = practiceModeRef.current;
                    const tAT = traceAllTargetRef.current;
                    const teT = tenTargetRef.current;
                    const bT = blankTargetRef.current;
                    const tS = testTargetRef.current;
                    const nextMode = (() => {
                        if ((mode === 'traceAll' || mode === 'trace') && tAT > 0 && currentLogs.traceAll >= tAT) {
                            if (teT > 0) return 'ten';
                            if (bT > 0) return 'blank';
                            if (tS > 0) return 'test';
                        }
                        if ((mode === 'ten' || mode === 'hint') && teT > 0 && currentLogs.ten >= teT) {
                            if (bT > 0) return 'blank';
                            if (tS > 0) return 'test';
                        }
                        if (mode === 'blank' && bT > 0 && currentLogs.blank >= bT) {
                            if (tS > 0) return 'test';
                        }
                        return null;
                    })();
                    // 全モードが完了したかチェック
                    const allDone =
                        (tAT === 0 || currentLogs.traceAll >= tAT) &&
                        (teT === 0 || currentLogs.ten      >= teT) &&
                        (bT  === 0 || currentLogs.blank    >= bT)  &&
                        (tS  === 0 || currentLogs.test     >= tS);
                    if (isFlowDoneRef.current) {
                        // フロー完了後の自由練習中 → モードはそのまま
                    } else if (allDone) {
                        setPracticeMode(null);
                        setIsFlowDone(true);
                        isFlowDoneRef.current = true;
                    } else if (nextMode) {
                        setPracticeMode(nextMode);
                    }
                }, 800); 
            };

            const completionLevel = settings.completionLevel || 1;

            const canSelect = (type) => {
                if (completionLevel === 3 && type !== 'test') return false; 
                if (completionLevel === 2 && (type === 'traceAll' || type === 'trace' || type === 'ten' || type === 'hint')) return false; 
                return true; 
            };

            const traceTheme = COLOR_OPTIONS.find(c=>c.id===settings.traceColor) || COLOR_OPTIONS[0];
            const blankTheme = COLOR_OPTIONS.find(c=>c.id===settings.blankColor) || COLOR_OPTIONS[1];
            const testTheme = COLOR_OPTIONS.find(c=>c.id===settings.testColor) || COLOR_OPTIONS[3];
            
            // ▼ てんモードの色を、なぞりモードと同じ色に統一
            const tenTheme = traceTheme; 

            // モードがnull（全完了後）のときはニュートラルなグレー
            const borderColor = !practiceMode ? '#d6d3d1' :
                                (practiceMode === 'trace' || practiceMode === 'traceAll') ? traceTheme.hex : 
                                (practiceMode === 'ten' || practiceMode === 'hint') ? tenTheme.hex :
                                practiceMode === 'blank' ? blankTheme.hex : 
                                testTheme.hex; 

            const unlockText = completionLevel === 3 ? "「みないで」からえらぼう！" : 
                               completionLevel === 2 ? "「おてほん」「みないで」からえらぼう！" : 
                               "えらべるよ！";

            return (
                <div className="flex flex-col h-screen w-full max-w-4xl mx-auto bg-[#fdfbf7] overflow-hidden">
                    <div className="pt-3 pb-2 flex flex-col items-center z-10 shrink-0 transition-colors duration-500">
                        
                        <div className="w-full flex justify-between items-start mb-2 px-3 gap-2">
                            <div className="flex flex-col gap-2 shrink-0">
                                <button onClick={onBack} className="text-stone-500 flex items-center gap-1 text-sm bg-white px-3 py-1.5 rounded-full mt-1 hover:bg-amber-50 border border-stone-200 shadow-sm active:scale-95 transition-all"><span className="text-base leading-none">↩️</span> もどる</button>
                                <div className="flex gap-2">
                                    <a href="admin.html" onClick={(e) => { e.preventDefault(); onOpenAdmin(); }} className="text-stone-500 flex items-center justify-center text-xl bg-white w-10 h-10 rounded-full hover:bg-amber-50 border border-stone-200 shadow-sm active:scale-95 transition-all leading-none">⚙️</a>
                                    <button
                                        onClick={() => onToggleSound()}
                                        title={settings.soundEnabled !== false ? "おとをけす" : "おとをならす"}
                                        className="text-stone-500 flex items-center justify-center text-xl bg-white w-10 h-10 rounded-full hover:bg-amber-50 border border-stone-200 shadow-sm active:scale-95 transition-all leading-none"
                                    >
                                        {settings.soundEnabled !== false ? '🔔' : '🔕'}
                                    </button>
                                </div>
                            </div>
                            
                            <div className="flex-1 flex justify-center">
                                <div className="flex items-center gap-3 md:gap-6 bg-white px-4 py-3 md:px-8 md:py-4 rounded-3xl shadow-md border-2 border-amber-200 max-w-2xl w-full">
                                    
                                    <div className={`relative shrink-0 pr-3 md:pr-6 py-1 md:py-2 ${isTestMode ? 'border-transparent' : 'border-r-2 border-dashed border-stone-200'}`}>
                                        <div className="text-4xl sm:text-5xl md:text-6xl font-kyokasho text-stone-800 font-bold leading-none tracking-widest">【{targetKanji.char}】</div>
                                        {isTestMode && (
                                            <div className="absolute -left-2 -right-3 md:-right-4 bg-stone-100 rounded-xl flex items-center justify-center text-stone-400 z-10 border border-stone-200 shadow-inner"
                                                style={{top: '-6px', bottom: '-6px'}}>
                                                <span className="text-2xl md:text-3xl grayscale opacity-50">🙈</span>
                                            </div>
                                        )}
                                    </div>

                                    <div className="flex items-center gap-2 md:gap-4 min-w-0 flex-1">
                                        <span className="text-4xl sm:text-5xl md:text-6xl shrink-0 drop-shadow-sm">{targetKanji.icon}</span>
                                        <div className="relative flex-1 min-w-0">
                                            <span className="text-xl sm:text-2xl md:text-3xl font-kyokasho text-stone-700 font-bold tracking-widest break-words leading-tight">
                                                {targetKanji.word}
                                            </span>
                                            {isTestMode && (
                                                <div className="absolute -left-2 -right-2 bg-stone-100 rounded-xl flex items-center justify-center text-stone-400 z-10 border border-stone-200 shadow-inner"
                                                    style={{top: '-6px', bottom: '-6px'}}>
                                                    <span className="text-xl md:text-2xl grayscale opacity-50">🙈</span>
                                                </div>
                                            )}
                                        </div>
                                    </div>
                                    
                                </div>
                            </div>
                            <div className="w-20 shrink-0"></div> 
                        </div>

                        <div ref={practicesStripRef} className={`w-[95%] h-36 md:h-44 rounded-2xl p-3 md:p-4 flex gap-3 overflow-x-auto relative items-center transition-all duration-500 ${isGoalReached ? 'bg-gradient-to-br from-amber-50 to-orange-50 border-4 border-amber-400 shadow-lg' : 'bg-white border-4 border-amber-200 shadow-sm'}`}
                            style={isGoalReached ? { boxShadow: '0 0 0 4px #fde68a44, 0 4px 24px #fbbf2420' } : {}}>
                            
                            {practices.length === 0 && (
                                <div className="w-full h-full flex flex-col items-center justify-center gap-2 text-amber-400">
                                    <span className="text-3xl opacity-50">✍️</span>
                                    <span className="text-sm font-bold text-amber-500/70">かいた文字がここに集まるよ！</span>
                                </div>
                            )}
                            
                            {isGoalReached && practices.length > 0 && (
                                <div className="absolute top-0 left-0 text-white text-[10px] md:text-xs font-bold px-2 md:px-3 py-0.5 md:py-1 rounded-br-xl z-20 flex items-center gap-1 shadow"
                                    style={{ background: 'linear-gradient(90deg, #f59e0b, #f97316)' }}>
                                    <Unlock className="w-3 h-3 md:w-4 md:h-4"/> {unlockText}
                                </div>
                            )}
                            
                            {/* モード別進捗バッジの更新 */}
                            {!isGoalReached && (
                                <div className="absolute top-0 left-0 bg-stone-500/80 text-white text-[9px] md:text-[10px] font-bold px-2 py-1 rounded-br-xl z-20 flex items-center gap-1.5 shadow">
                                    <Lock className="w-3 h-3 shrink-0"/>
                                    {traceAllTarget > 0 && (
                                        <span className={`px-1 py-0.5 rounded ${sessionLogs.traceAll >= traceAllTarget ? 'text-green-300' : 'text-white/80'}`}>
                                            ✏️{sessionLogs.traceAll}/{traceAllTarget}
                                        </span>
                                    )}
                                    {tenTarget > 0 && (
                                        <span className={`px-1 py-0.5 rounded ${sessionLogs.ten >= tenTarget ? 'text-green-300' : 'text-white/80'}`}>
                                            ⚫️{sessionLogs.ten}/{tenTarget}
                                        </span>
                                    )}
                                    {blankTarget > 0 && (
                                        <span className={`px-1 py-0.5 rounded ${sessionLogs.blank >= blankTarget ? 'text-green-300' : 'text-white/80'}`}>
                                            👁️{sessionLogs.blank}/{blankTarget}
                                        </span>
                                    )}
                                    {testTarget > 0 && (
                                        <span className={`px-1 py-0.5 rounded ${sessionLogs.test >= testTarget ? 'text-green-300' : 'text-white/80'}`}>
                                            🙈{sessionLogs.test}/{testTarget}
                                        </span>
                                    )}
                                </div>
                            )}

                            {practices.map((p, i) => {
                                const isSelectable = canSelect(p.type);
                                const colorTheme = (p.type === 'traceAll' || p.type === 'trace') ? traceTheme :
                                                   (p.type === 'ten' || p.type === 'hint') ? tenTheme :
                                                   p.type === 'blank' ? blankTheme : testTheme;
                                
                                return (
                                    <div key={p.id} 
                                        onClick={(e) => {
                                            if (isGoalReached && isSelectable && !savingId) {
                                                setSavingId(p.id);
                                                speakWithSettings(targetKanji.char, settings);

                                        {/* ▼ 「てん」のラベルも、なぞりと同じ青系の配色に統一 */}
                                        {(p.type === 'traceAll' || p.type === 'trace') && <span className="absolute -bottom-2.5 left-1/2 -translate-x-1/2 text-[9px] font-bold text-sky-600 bg-sky-50 px-1.5 border border-sky-200 rounded-full whitespace-nowrap shadow-sm">なぞり</span>}

                                        {p.type === 'test' && <span className="absolute -bottom-2.5 left-1/2 -translate-x-1/2 text-[9px] font-bold text-purple-700 bg-purple-50 px-1.5 border border-purple-200 rounded-full whitespace-nowrap shadow-sm">みないで</span>}
                                    </div>
                                )
                            })}
                         </div>
                    </div>

                    <div className="flex-1 flex flex-col p-2 md:p-4 w-full">
                        {/* ▼ mt-autoラッパー: モードボタン行 + 見本・キャンバス行をまとめて画面下へ */}
                        <div className="mt-auto flex flex-col items-center w-full">

                            {/* ① モードボタン: キャンバスサイズと無関係の固定行 */}
